body:
  text: 淡菴文集别集類三宋提要臣等謹案淡菴文集六卷宋胡銓撰銓字邦衡廬陵人建炎二年進士甲科紹興五年以薦除樞密院編修官抗疏詆和議謫吉陽軍孝宗即位特召還擢用厯官權中書舍人兼國子祭酒權兵部侍郎以資政殿學士致仕卒諡忠簡事迹具宋史本傳銓師蕭楚明于春秋故集中嘉言讜論多本春秋義例于南渡大政多所補救史但稱其髙宗時請誅秦檜今考集中論撰賀金國啓一篇則于孝宗朝召還以後更嘗請誅湯思退又孝宗本紀隆興元年三月金以書來索四州未報八月又齎書兩省今考集中玉音問答一篇知答金人書孝宗已與銓定于五月三日遲至八月未遣必湯思退有以持之當時情勢可以考見史文疏漏賴此集尚存其崖略也本傳稱銓集凡百卷今所存者僅文五卷詩一卷蓋得之散佚之餘然書録解題載銓集七十八卷宋志載銓集七十卷則在當時已非百卷之舊矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀淡菴文集原序故淡菴先生資政殿學士忠簡胡公中興人物未能或之雙也紹興戊午髙宗皇帝以顯仁皇太后駕未返不得已將以大事小屈尊和戎先生上書力爭至乞斬宰相在廷大驚金人聞之募其書千金三日得之君臣奪氣知中國有人奉皇太后以歸自是邉馬不南者二十年昔魯仲連不肯帝秦秦軍聞之為却五十里後人疑之以為說士之夸辭以今揆古古為夸矣以今觀今今亦夸乎信所見疑所聞古今一也吾宋之安疆不以百萬之師而以先生之一書後之人聞之者烏知其不若今之人聞仲連之事者乎亦以為夸未可知也若今之人親見先生之事則誰以為夸者今事之夸與否可信與否不較也使後之人無所疑於古之人者先生歟今不信古古奚病焉後不信今必當有時而無不信矣逢其事思其人嗚呼先生之功其逺矣哉先生之功其逺矣哉先生之文肖其為人其議論閎以逺其記序古以馴其代言典而實其書事約而悉其為詩蓋自抵斥時宰謫置嶺海愁狖酸骨饑蛟血牙風呻雨喟濤譎波詭有非人間世之所堪耐者宜芥於心而反昌其詩視李杜夜郎䕫子之音益加恢竒云至於騷辭涵茫嶄崒鈢劌刻屈抉天之幽泄神之祕槁瘦而不瘁恫愀而不懟自宋玉而下不論也靈均以來一人而已夫是數者得其一猶足以行於今而傳於後而况萃其百乎何其盛也何其盛也先生既沒後二十年其子澥與其族子渙族孫祕裒集先生之詩文七十卷目曰淡菴文集欲刻板以傳貧未能也之官中都舟過池陽太守蔡侯必勝相見因問家集慨然請其書刻之命郡文學周南董振之學録何巨源校讎之未就而蔡侯移守山陽雷侯孝友顔侯棫踵成之嗟乎先生功被於中國名震於邉隅文範於學者學者得其片言半簡猶寶之師之求見其書之全何可得也今三侯獨能刻而傳之以幸學者夫先生此集為之百年而始成使學者得之今乃一日而盡見三侯之用心可不謂賢矣哉而蔡侯首發其端可不謂尤賢矣哉萬里嘗學於先生者先生之言曰道六經而文未必六經者有之矣道不六經而文必六經者無之先生之文其所自出蓋淵矣乎而萬里何足以知之先生廬陵人諱銓字邦衡淡菴其自號也若其世系厯官行事則丞相益國周公書於神道碑云慶元五年己未八月草八日通議大夫寶文閣待制學士致仕門人楊萬里序
