body:
  text: 澹菴文集巻一宋胡銓撰制䇿御試策一道蓋聞治道本天天道本民故視聴從違不急於算數占候而惟民是察持以至誠無逺弗届古先哲王罔不由斯道也朕承宗廟社稷之託於俶擾阽危之後懐父母兄弟之憂於攜貳單微之時念必撫民以格天庶或悔過以靖亂踰年於兹寢興在是故府庫單匱軍費倍滋而賦斂加薄外患未弭盜賊尚多而追胥有程擇守令以厚收養責按亷以戢貪暴命令為民而下者十常六七凡曰聚所欲去所惡者朕未有聞而不恤恤而不行也然而迎親之使接武在道而敵情未孚保國之謀刻意在兵而軍勢未張躬純儉以敦本而奢侈之習未悛擴大公以示訓而私罔之俗尚勝刑賞不足以振偷惰之氣播告不足以革狂悖之心田畆未安旱蝗害嵗豈朕不徳無以動天聴抑政令失宜而民以為病乎何精神之弗效而禍亂之難戡也伊欲復親族奠疆塲清冦攘善風俗使百姓樂業而亹亹迓衡何修而可以臻此子大夫涉艱險以副詳延誠亦勤矣其必有至言欲為朕陳者其悉言之無隠若乃矜空文而無補於實咎既往而無益於今者非朕之所欲聞也其以朕之未聞而切於時者言之朕將親覽焉臣聞國將興聴於民國將亡聴於天湯武聴於民其興也勃焉桀紂聴於天其亡也忽焉方桀紂之未亡也謂已有天命曰我生不有命在天彼以天命為真可恃偃然自謂子孫帝王萬世之業也及其亡也諸侯歸商者三千兹以勝夏則成湯以興諸侯歸周者八百兹以勝商則武王以興湯武聴於民而反以興非民興之也修人事以應天是以興桀紂聴於天而反以亡非天亡之也恃天命而虐於人是以亡興亡之端厥監在民而不在天甚易曉也而中材庸主每反之此忠臣義士所以深悲天下之亂亡相尋而世主不悟也陛下起干戈鋒鏑之間適值天下倥􅘓不暇給之秋外亂内訌憸人秉朝邊方有風塵之虞中原有新羈之馬赤子入無知之俗民愁盜起禍稔蕭牆王室揺揺然幾如一髮引千鈞當此之時可謂亂甚矣臣愚謂陛下宜焦心嘗膽聴于民之時也而陛下䇿臣等數十條大概質之於天首曰盖聞治道本天天道本民又曰豈朕不徳無以動天又曰何精神弗效而禍亂之難戡也似皆聴於天者此臣所以深疑而願為陛下直言無諱也伏讀聖䇿曰盖聞治道本天天道本民故視聴從違不急於算數占候而惟民是察持以至誠無逺弗届古先哲王罔不由斯道也臣有以見陛下聴於天而不聴於民之弊也臣銓按春秋禍亂之由與祖宗已然之故事為陛下陳之為春秋之説者曰春次天王次春王者上承天之所為而下以正其所為此漢儒傅㑹之論臣謂不然臣聞聖人作春秋尊一王之法為萬代之訓未嘗有明言天者盖天道難測若深言之則遂以為茫昧莫究而忽於天若淺言之則天下後世遂溺於隂陽灾異而蔽於天聖人推其變於天常與人事雜而書之至其變見禍敗或應於數十年之後甚則或不旋踵而應國家將有失道之敗天乃出灾異以譴告之不知自省又出怪異以警懼之尚不改悔覆敗乃至茍無其事變不虚生若痛自惕懼側身修行則禍灾滅塞禍可轉福此春秋之大凡也以是知天心之愛人君而欲止其亂也自非大亡道之世天盡欲扶持全安之此古先哲王所以持其至誠而不急於算數占候誠知夫天人相與之際甚可畏也我國家自江南平定太祖感宇縣分割生民受弊涕下惻然思布徳以撫養之是時識者知天命固已牢不可解矣且如擇一法官細事也而太祖擇王濟則曰無或有寃濫以致天灾任一憲臺細事也而真宗選諸道提典刑獄則曰一夫受寃即有灾沴夫一夫受寃宜未害也而祖宗惕然動念懼致天罰則民之不可忽而造物之不可欺也明矣陛下龍飛之初傳檄四走天下莫不翕然響應臣愚雖不識天以人事驗之知天意固已有在比來聖慮漸解浸不克終國勢委靡而不振生民愁苦而無聊天意向背殆有不測可勝寒心臣願陛下持以至誠以春秋為戒而謹持之以祖宗為監而力行之毋以草茅之言而罷之則天下幸甚聖䇿曰朕承宗廟社稷之託於俶擾阽危之後懐父母兄弟之憂於攜貳單微之時念必撫民以格天庶或悔過以靖亂踰年於兹寢興在是兹又陛下聴於天而不聴於民之弊也嗚呼陛下興言及此亦知有宗廟社稷之託乎亦知有父母兄弟之憂乎知有宗廟社稷之託則所與任其託者為誰知有父母兄弟之憂則所與分其憂者為誰任其托分其憂一非其人則天下之大勢無復救矣臣聞天下大器得之甚難敗之甚易莫不由夫祖宗辛苦艱難以成立之莫不由夫子孫頑率奢傲以覆墜之成立於百年而覆墜於一日遂使祖宗艱難之業并與祖宗社稷之業一旦成墟是以聖人作春秋於亂君亡國痛以王法繩之謹按昭公二十二年書王室亂劉子單子以王猛居於皇是時新有景王之難王猛以幼沖而嗣大位劉單以庸材而相幼君社稷危如贅疣則王室安得不亂夫王室天下根本根本一亂而播遷於皇則俶擾阽危亦甚矣卒之天王播遷避子朝之難終昭公之世僅復成周至黄池之㑹天下奔潰而聖人獨反覆書之重社稷也陛下單微幼沖之資獨戡多難則危如王猛左右大臣以憸佞之才而佐大計則庸如劉單臣恐王室之難又甚於子朝之難矣安知江都之幸不變為狄泉之脇迫乎是陛下知承宗廟社稷之託於俶擾阽危之後而未知荆卿何乃竊發於肘腋之間願陛下思太祖得天下之難而早圖之監春秋王室之禍而慎守之毋謂懐父母兄弟之憂於攜貳單微之時而遂解體也謹按襄公二十八年書曰公如楚二十九年書曰公在楚又曰公至自楚竊原公如晉如齊如京師皆未嘗書在獨於楚書在何也曰楚虎狼之國也襄公如楚既非常而逾年不返禍且不測書曰在楚者盖臣子痛君之失所在也以今兩宫有沙漠之狩孰與如楚之危哉且襄公二十八年如楚至二十九年而歸春秋深危之况兩宫暴露於穹廬三年於此矣則陛下懐父母兄弟之憂臣愚不知何以處之為陛下計者獨不念在楚之事乎臣願慎擇賢佐惟斷惟果側身憂慮如宣王勵精綜核如孝宣鋤去亂畧如光武剛明果斷如憲宗復讎刷恥如勾踐以春秋為戒而謹持之以祖宗為監而力行之毋以草茅之言而罷之則天下幸甚陛下首䇿以此中則曰府庫單匱軍費倍滋而賦斂加薄外患未弭盜冦尚多而追胥有程擇守令以厚牧養責按亷以戢貪暴命令為民而下者十常六七凡曰聚所欲去所惡者朕未有聞而不恤恤而不行也此又陛下聴於天而不聴於民之弊也臣聞治天下者正如療疾方天下之未受病也府庫單匱軍費倍滋則病在血脉矣外患未弭盜冦尚多則病在腸胃矣客邪干正矣擇守令以厚牧養猶導之以湯液醪醴而助真氣也責按亷以戢貪暴猶投之以砭劑而攻强陽也如使人血脉受病腸胃又受病而導之以湯液醪醴者或失節焉則疾益甚疾既甚而投之以砭劑者又非良焉祗速其死耳醫國者亦然故方天下受病之際府庫竭矣外患熾矣冦盜多矣乃牧之以不賢之守令擾之以不才之按亷是猶疾已深而投之野葛豈不殆哉臣請厯言其弊臣聞府庫單匱軍費倍滋者以兵冗而坐食也以師老而費財也以生寡而食衆也三者今之大弊也自古兵無事則不可使聚聚則不可使無事而食其勢然也昔漢之兵制有踐更之卒而無營田之兵京師亦不過南北期門羽林之兵而止邊境有事諸侯有變則皆以虎符調發郡縣之兵事已輒罷是以其兵雖不知農而天下不困兵甲未嘗聚也唐制十六衛無事則力耕而積粟非但自贍且以廣縣官之儲是以其兵雖聚於京師而天下亦不困者未嘗無事而食也我朝沿近代養兵之法中外一兵衣糧給與嵗約五六十緍太祖得周代之兵中外止有二萬而已至乾徳間中外止有十萬兵耳太宗盡有天下添兵至多亦止三十餘萬真宗當全盛之時乃始五十餘萬而已當時軍數非多尚慮耗蠧調度命汰疲冗周瑩不奉減兵之詔則怒而罷之向敏中奏軍額漸多則反覆詰難之誠知夫兵無事則不可使聚聚則不可使無事而食也臣故曰兵冗而坐食今之最大弊也按兵法興師十萬日費千金以日計之費已如此况今曠日彌年兵連不解百人仰食縣官則挾千夫之名大槩雖數百為輩要歸則無異於數十萬之兵而坐食連年無毫髮功則農之力安得不乏餽餉之卒安得不疲謹按莊公八年春師次于郎夏師及齊師圍郕秋師還春秋書用兵未有厯三時而復返者獨於此書春書夏書秋惡莊公無故勞師興圍郕之役卒之郕降於齊而魯師無功比秋乃還故書曰師還者惡夏已無功秋始班師暴露滯留之甚也是後二十八年有告糴之舉其禍正基於圍郕之役以今征役之乆動至累年較之春秋三時返者不已太甚乎則府庫竭而軍費滋自不足怪臣故曰師老而費財者今之最大弊也兵冗而坐食師老而費財加以生寡食衆入少出多陛下雖賦斂加薄而州縣之追科實厚何則用度既匱則其勢不得不取於民矣臣前所謂追胥有程而外患未弭冦盜尚多者其弊在朝廷多過生靈多怨使朝廷無過生靈無怨則外患冦盜亦何名而動哉盖古姦雄如陳涉吳廣之起於秦赤眉黄巾之起於漢蘇峻之亂晉安史之亂唐本皆巨盜兇渠伺朝廷之過執以為辭幸生靈之怨倡而稱義遂至迭起郡縣刼令殺守相挺為亂今明盛之朝豈有大過竊聞長老之嘆或謂近戚撓權奸臣竊柄刑賞不必行小人不盡除綱紀不勝張此豈過之漸耶何則自古亂天下國家多自近戚撓權始如漢之諸呂竇霍唐之諸武韋張竊弄朝柄一敗赤族國家俱破今乃肺腑領樞柄戚屬將衛兵漢南北軍之禍其監不逺倘不少戢是増朝廷之過而起姦雄之膽大亂之後豈宜復然晉趙王倫石勒之徒心窺人主口責宰相實奸雄伺過而後動不幸因之以飢饉加之以灾荒生民愁苦而無聊則奸人乗隙奮飛血流千里此外患所以未弭冦盜所以尚多是雖追胥有程何以救其亂謹按昭公十一年楚子䖍誘蔡侯般殺之於申蔡般弑逆之賊王誅之所必加春秋反惡楚靈何也曰討蔡般可矣誘而討之此匹夫之賤行春秋所甚惡也前日下詔招納叛亡許以不死此輩皆投戈請命謂陛下示以大信也然而陽示以信隂加以刑是誘討也陛下為人父母奈何以天子詔書為誘人之餌臣恐大信一失則後來以招降為悔自今上下相忌如寇讎聚處得間則更相魚肉惟先發者為雄耳何怪乎冦盜之未弭乎臣前所謂擇守令以厚牧養而守令多不賢者朝廷輕守令也責按亷以戢貪暴而按亷多不才者朝廷輕按亷也守令一不賢則郡縣受禍按亷一不才則守令敢於為姦故擇守令在擇按亷此祖宗之成法太祖太宗注意守令尤切太宗嘗親選諸州長吏又親書其厯戒曰公務刑政惠愛小民奉法除奸方可書為勞績因顧謂錢若水曰朕暑中書豈不勞乎盖謂任官擇人以安百姓耳嗚呼太宗不憚盛暑而親札賜行令守令則未有召對者太宗躬自選擇而延見便殿今乃有赴吏部而注擬者是朝廷輕守令也朝廷輕守令則守令輕郡縣郡縣之職一輕則牧養之方盡廢使要近州縣或非其人彼畏朝廷耳目之近尚憚不敢逞若逺方細民雖使盜跖為之守檮杌饕餮為之令斯民雖千百為輩號呼聚罵朝廷不知其為害豈不大哉臣聞太祖以錢文敏知瀘州戒之曰比聞郭思濟掊斂不法恃其遐逺謂朝廷不知耳至則為朕鞫之夫瀘州去京師四千餘里而郭思濟不法朝廷已盡知之今州縣稍逺者其守令過失朝廷乃不聞則逺如瀘州者陛下必不能知也彼何憚而不為盜耶然則所賴以糾察其弊者尚賴按亷耳如按亷又非其人則其禍可勝言哉臣聞太祖以按亷之職出為朝廷耳目或由聖選或由舉充選之既艱則任之亦重凡寛一按亷是壊一路之事一路不治是使數百萬軍民受殃自太宗即位勵精求治詔轉運使考覈職任之廢舉又遣使亷察官吏之汙潔如劉文質察舉部内官吏則有選移之寵如王徳裔部内不治則有黜削之罰賞罰如此其嚴則按亷振威按亷振威則守令振職厥今守令不職是按亷未得其人也往者遣使撫諭諸道天下想望風采以為行被大惠卒之廚傳騷然賄賂公行甚者責子女於郡縣輦家屬以偕行雖官以撫諭為名而民有供役之苦守令之外復増一蠧夫逺方細民不幸遭不賢守宰終嵗抱寃引領輶軒之出以雪其憤而按亷又不才是使終身懐寃而莫之控愬也則民安得不多怨而易動此奸雄所以竊發也謹按春秋閔公元年齊仲孫來聖人佳而字之重其將命從宜以安鄰國之難方閔之初叔牙慶父媒孽魯禍閔公始立國人危如贅疣齊人可折箠而取之當是時魯之輕重在齊仲孫乃能説其君務寧魯難卒使閔不失國而魯人以安秋毫皆其力也經書仲孫之來喜其出而安民存魯也以今兩河淮甸兵革之餘豈不甚於魯國之難而按亷之出未聞如仲孫以務寧魯難為意者以春秋之法責之則罪人矣臣故曰守令不職是按亷未得人夫以守令既不職按亷又失職如此則陛下命令為民而下雖十常六七而壅遏詔書十常八九矣是陛下有恤民之詔無及民之惠州縣知有守牧之令不聞有天子之詔三數年來邊防用兵凡百科斂不問四方有無物之地但嚴令督責之近海州軍例科鎗榦居山州縣例買鵝翎有司既不辨有無州縣或罕能條奏官取一物而民費數倍且如前日勸誘一事監司責辦於郡郡責辦於縣縣移文於鄉假軍用急迫為名迫若星火小有不至械繫苦楚人皆畏死其敢有辭是名為勸誘而實暴斂之監司郡守但務上供以悦朝廷則忽而不知省宰相大臣但務足用以悦陛下則知而不敢言上下相䝉民窮無訴是陛下恤民之詔雖多於孝文而天下乾耗乃甚於孝武傷和召怨咎將誰歸臣聞咸平中議改元赦書頗多蠲免或謂三司必以惠澤太廣為言真宗責曰非理害民之事朝廷所不可行若赦令既行必使良人受賜矣時方午雷震帝惻然曰豈赦令少及民之惠上天以雷震朕耶嗚呼祖宗以赦令未遍懼速天罰則陛下命令多壅實悖天心其害殆不為細願陛下以春秋為戒而謹持之以祖宗為監而力行之毋以草茅之言而罷之則天下幸甚陛下中䇿以此又念迎親之使接武在道而敵情未孚保國之謀刻意在兵而軍勢未張躬純儉以敦本而奢侈之習未悛擴大公以示訓而私罔之俗尚勝刑罰不足以振偷惰之氣布告不足以革狂悖之心田畆未安蝗旱害嵗豈朕不徳無以動天抑政令失宜而民以為病乎何精神之弗效而禍亂之難戡也此又見陛下聴於天而不聴於民之弊也臣謂陛下躬純儉而驕奢未悛者是陛下未必純儉也擴大公而私罔尚勝者是大公未必能擴也賞罰不足以振偷惰是大柄下移也播告不足以革狂悖是危亂之兆也田畆未安而旱蝗害嵗則生民失職而怨沴並作也乃若遣迎親之使而敵情未孚則臣竊有説焉臣聞慶厯中契丹聚兵境上遣其使蕭英劉六符來聘是時使來非時而兵既壓境中外忿怨仁宗皇帝命宰相擇所以報聘者得左正言富弼片言折六符之謀卒挫敵主自景徳以來北方無事八十餘年於此矣豈惟弼之力哉是時宰相則晏殊參政則范仲淹樞密則杜衍韓琦諫官則余靖歐陽脩皆天下所仰望而北國之所畏憚也彼知朝廷有人故弼之計得行而敵計不得逞以今廟堂之上宰相有如晏殊者乎參政有如范仲淹者乎樞密有如韓琦杜衍者乎諫官有如余靖歐陽脩者乎臣知陛下必無此等人物矣而欲求敵情之孚此臣大惑也臣聞猛虎所以為百獸畏者為爪牙也使棄其爪牙則孤豚特犢皆得摶噬之譬之國無勁兵則蕞爾之冦皆為勍敵故春秋雖惡窮兵之禍至於兵不素養而取具臨時又深惡之謹按僖公二十六年齊人伐我北鄙公子遂如楚乞師公以楚師伐齊取榖説者曰乞重辭也重師也臣謂聖人非惟意在於重師盖惡魯之無備也夫齊為魯難乆已自獻之役齊敗於宋而魯不救是時孝公有切骨之恨至二十六年春侵我西鄙怨已結矣為魯計者正宜蚤夜預防常若冦至乃恬然熟卧養成腹脇之疽報不旋踵而齊人伐我北鄙矣乃至乞師於楚以取榖焉假荆蠻而伐中國不可之最大者也以今金勢大張害甚於齊而兵不素養乃甚於魯議者乃欲借助兵於髙麗何異乞師於楚以伐榖者哉是陛下徒知軍勢之未張而不知兵將之未練也可為陛下痛哭流涕者此也國初劍南交廣各僣大號荆南江廣不通貢奉西戎北狄未盡賔服太祖埀意將帥命李漢超等守關南命郭進禦并冦命姚内斌守慶州以為既得名將非厚通其意無以得其死力故許收逐郡關征酒𣙜之利不惟養犒士卒兼使豐富其家又慮所費不足仍許圖回其家屬在京師者并厚撫之則將帥之心更無私慮但專力於邊事而已又慮奏陳之事未盡機要特許入朝自陳至升殿賜坐又復厚賜遣之以故邊臣多富於財得以養募死力使為間諜盡知蕃夷情狀多致克㨗三十年間無西北之憂平西蜀復湖湘下嶺表克江南盡得東南之地雖諸將之功實太祖馭將之力也以今將士偏裨其雄挺孰與李漢超其才略孰與姚内斌其鎮重孰與馬仁瑀其運籌決敵孰與韓令坤以今陛下駕馭諸將孰與太祖然而借之重權禄之顯秩賜之重賞其恩已過先朝數等矣是陛下擇將不如太祖而恩禮則過之適足以啟諸將之驕心而長姦臣之觖望假令恢復兩河迎還二聖陛下何以加之夫戰勝之兵勇智百倍敗亡之卒没世不復盖所以戰勝者氣也今之士不戰而氣已索此天下之憂也昔者六國之際秦人出兵於山東開關延敵六國之師皆逡巡不敢進然長平之敗亷頗猶能收拾餘燼北摧栗腹西抗强秦振刷磨淬不自屈服是時秦圍邯鄲梁王使新將軍如趙遂欲帝秦而魯仲連慷慨涕泣以為不可非惜帝秦之虚名也惜天下之大勢有所不可也而議者乃謂宜尊奉仇敵不可一觸其意陛下何不以魯仲連抗秦之事諭之然則何怪乎軍勢之未張也夫春秋何為而作也為天下無王而作也周衰天下不知有王陪臣執國命家臣僣大夫聖人有憂之作春秋以代王之賞罰書天子書王書天王則至大之稱天王與周官司服所稱天王皆以嗣君之初君道未著人心未寕正危疑之機大姦之所伺非常之時故大威武以防之稱天王者大威武以防天下之時故曰非常也然則又書天子書王何也曰春秋作王者威權喪矣大政大法諸侯擅而行之怙强恃衆迭相吞據是本末大弱之世名分大亂之時非剛健大過人之才若九四焉不足以震其弱非毒衆窮討之役若唐太宗焉不足以戢其亂故仲尼於春秋凡有出於王為之者皆書天王言於斯世王之所為當大誅賞不可循常道冀後世興王知變也是時吳楚之君皆鴟視虎踞僣號稱王諸蠻羣酋薦據中土如此則文辭之告猶可治之也歟霸侯暴國迭相吞噬伯子之存不能十數如此則誅賞之令猶可治之也歟故曰如有用我者吾其為東周乎東周僅存禮文而已非撥亂反正之道也故春秋書天王者正賞罰於大亂之後也若事非王為但從諸侯之稱只書王者禮之常也其曰天子者所謂至貴以親諸侯也莊王不稱天王以其寵弑逆之人不足以當至大之稱故去天字以重其譏重莊王之譏則魯桓之罪彰矣春秋大逆外始於州吁内始於魯桓聖人著其惡如此若曰世亂則從惡者多趨善者鮮善若不予則是賞不足以有勸大奸大惡不加誅則是罰不足以有懲賞罰不行而能興衰撥亂者無有矣陛下臨御之初正春秋危疑之機書天王以臨下之時大柄大權乃悉竊弄權臣之手太阿倒持救之良難是陛下有春秋之亂而無春秋之賞罰何以駕馭羣雄而平大亂也竊觀太祖太宗所以取天下其大要在賞罰二事而已當時賞則甚薄刑則甚嚴方澶淵之役李繼隆有疾戰破敵之功但加開府階耳臣嘗怪真宗何賞如是之薄也其深意以謂既殺敵將而不能破其衆此將之可責也有將帥之寄而獨賞内臣不可以為後世法此所以薄其賞一也又以自古宦者領兵未嘗不為亂如太宗朝内侍王繼恩出平蜀亂有大功止受宣政使爾謹守先帝之法而不敢違此所以薄其賞二也至馭之以刑則未嘗不嚴且如主將戰没則降黜别將如王繼勲者誅戮親兵如荆罕儒者威令如此嚴則人皆死力求賞故太祖兵法罪在不赦春秋兵法尤嚴於馭軍城濮之役楚師敗績則得臣死之書曰殺其大夫得臣罪在得臣也鄢陵之役楚又敗績則子反死之書曰殺其大夫公子反罪在子反也二子皆以失律喪師不逃重戮則見夷狄用兵其刑賞常嚴而中國常寛此夷狄所以常得志於成襄之後中國累累受制於吳楚者抑有由矣厥今軍勢未張而動見敗衂是有春秋之亂而無春秋之賞罰臣故曰賞罰不足以振偷惰則是大柄下移也如使大柄一移則陛下徒擁虛器而已何怪乎播告不足以革狂悖也然臣愚不識狂悖者為誰謂前日詆忤權臣者為狂悖乎謂左右便嬖為狂悖乎則陛下豈不能斷然而去之哉竊料陛下所以不能去之者則是推委權臣之弊也自古以推委臣下為盛美然亦或以治或以亂漢髙祖委任羣傑則治至其後推委王鳳王音至於王莽則亂光武推委二十八將而取天下則治至其推委后族至于董呂二袁則亂魏委荀彧則治至委司馬懿則亂唐文皇駕馭英豪而取天下則治至明皇推委李林甫楊國忠則亂初以推委而天下治終以推委而天下亂何弊之然哉當推委之際超擢十人上從其九是九分之恩出乎下矣如此則數年間左右前後皆權臣之黨也若黜削十人上從其九是九分之威出乎下矣如此則數年間中外逺近無敢忤權臣者以故忠義解體而上下之勢孤也前日將相大臣放意誅戮寃及無辜陛下不得一舉手此豈推委之弊耶明皇天寶之禍未大逺也此可不為寒心哉厥今天下大體皆壊獨祖宗徳澤未泯人心未厭譬如病羸之人厭厭殆盡獨血氣尚在爾如使人心一離則是血氣又將絶天下無復可言矣而陛下以田畆未安旱蝗害嵗為患則是生民失職人心將離血氣將絶之時也謹按春秋灾異變見常與人事相符灾異見於上則禍變罹於下猶鐵炭之低昻見效可信也凡春秋書蟲者傷旱蝗之害稼也然書蟲凡九而哀公十數月之間凡三書之甚之也甚之者疾其害民之甚也按是時十三年之間而帥師伐某侵某取某戰於某地比他公為特甚干戈至此而糜爛其民矣生民至此而為血肉矣黄池之㑹夷狄主盟中國天下日趨於亡矣乃復暴興田賦民怨禍稔嵗大旱蝗人有艱食之苦聖人於此不一年而三書蟲傷之也是知旱蝗之患實兵戈怨毒之餘所由作也比年以來北冦横行干戈爛熳而不息未嘗一年不戰生民日委頓四夷日熾盛天下不知有生之樂幾年於此矣瘡痍之日肝腦塗地丘隴發掘辜及枯骨此肉腐血流者不知㡬億萬生靈之命陛下不得而見也士卒死邊野之外婦哭其夫母哭其子寡婦弱子抱負輀車望寃哀於千里之外途悲巷泣怨痛徹天陛下不得而聞也陛下不見其所不見不聞其所不聞驅民萬死之地而卒無一毫之利積毁銷骨積寃傷和隂沴作而灾禍興何怪乎田畆之未安旱蝗之害嵗也今者兩河淮甸赤地千里飛蝗蔽天公卿大臣熟視無計而請為遣蝗之舉嗚呼正使蝗而可遣是移腹心之疾而置諸股肱不知他境之民何苦而加之哉臣聞天禧中真宗以再嵗旱蝗秋稼不稔慨然動念寔慮政令闕失有爽天意因詔削鹽茶條禁之峻刻者以懲旱蝗之變以今政令闕違豈惟鹽茶一二事而已臣知旱蝗為害實天意大警陛下也而議者尚謂天灾流行由厯數運㑹非政令失宜之咎嗚呼天下有善則歸諸已天下有禍則歸之天此非聖賢之用心也願陛下少戢誅討少息調發練兵實粟養吾鋭氣而全中國之力以消蝗旱之灾毋以精神弗效而怠荒毋畏禍亂難戡而息志以春秋為戒而謹持之以祖宗為監而力行之毋以草茅之言而罷之則天下幸甚陛下中䇿臣以此又念伊欲復親族奠疆場清冦攘善風俗使百姓樂業而亹亹迓衡何修可以臻此臣於是有以見陛下真欲興衰撥亂以起天下之病也竊覩陛下首懐父母兄弟之憂中念迎親之使至此又以復親族為言是陛下痛念二聖鑾輿暴露而未有迎復兩宫之䇿也夫漢髙祖所以還太公於楚軍豈獨侯生力哉臣嘗料髙帝有勝項王者五以兵强力壯則楚不如漢以三傑為用則楚不如漢以駕馭諸將則楚不如漢以關中廩粟之多則楚不如漢以關中形勝之重則楚不如漢五者皆項王所不如則何若而拘太公哉以今凋疲之餘無漢之兵力無漢之駕馭無漢之三傑無漢之廩粟而又棄違上都棄去兩河則又無關中之形勢而欲求親族之復雖使如侯生等千百輩往焉臣知其無能為也故臣嘗謂欲復親族莫如復兩河不得兩河則親族不可復今陛下以奠疆場為念是欲復兩河也兩河既失係天下輕重唐神堯起晉陽以一旅取天下子孫不能以天下取河北其難如此晉於春秋為大嘗驅役諸侯至秦萃鋭兵加晉乃得韓遂折天下及韓信聨齊有之故蒯通知漢楚之輕重在信宋武號英雄得蜀關中盡有故疆十分之八然不能使一人渡河以窺邊是兩河之地王者不得則不王霸者不得則不霸賊得之則天下不安臣故曰不得兩河則親族不可得而復也咸平中真宗與王濟極論邊事濟言此時敵人敢爾憑陵盖謨謀當位之臣未有昔人之比且國家所恃特一河耳此誠急賢之秋不然臣懼北戎飲馬於河渚矣嗚呼濟之言誠切中今日之病臣謂欲復親族而收兩河亦誠陛下急賢之秋當以濟言為鑒也然當今最大患者親族之未復疆場之未奠冦攘之未清而臣所最大患者風俗之壊敗也風俗天下之筋絡也譬之人身所恃以維持血氣者惟筋絡耳風俗一敗則筋絡又絶矣漢唐之亡其弊皆風俗之大壊也故臣嘗論東漢之亡與李唐大畧相似東漢之季閹童亂政毒被生靈豪傑據郡而起天下遂裂為三國唐末宦者蠧於内藩鎮潰於外天下遂磔為五代然三國之士其好惡去就尚有可觀天厭漢徳而劉氏猶擁虚器亦卒以禪代終五季之亂其臣皆兇狠頑鄙戕賊君親專為梟雄豈天於東漢之季獨多君子而唐末專為小人哉誠風俗漸染然也中原亂亡自古更迭亦天下常事盖未有不亡之國也然當其時有推變於天而言者有以人事前知而言者有握節而死者有衛社稷而死者有憤國破亡奮不顧身并家族破滅者亦有知幾之士挂冠而去之不蹈其禍者我國家涵養天下之乆士大夫受君父之賜亦甚乆一朝國家有難自公卿劍履間以及天子之百執事凡幾人自王畿以達郡邑有位者凡幾人前知而言者為誰死名節者為誰死社稷者為誰推變於天而知其將亡者又復為誰狥國者為誰知幾而掛冠者為誰方晉南渡士流尚有聚於新亭傷國之衰對山河而下泣者周之東遷尚有不恤其緯而憂宗周之殞者今兩宫播越則非直東遷之辱也而陛下倉皇逺狩則非直南渡之迫誰復有泣對江山而憂宗周之殞者哉自晉風俗之壊而海内横潰生靈魚肉幾二百餘載以晉監今其禍可勝言哉昔田横齊之豪士恥北面臣漢遂自殺五百餘人皆死之無一人降漢者諸葛誕魏室之一叛臣及其既敗所養死士三百人就戮皆曰為諸葛公死無憾今之士大夫䝉國厚恩何啻齊卒之受恩於田横死士之就養於諸葛哉而忍恥含垢視君父之僇辱甘心焉嗚呼縱不愧田横之客又獨不愧諸葛之奴耶臣故曰今之最大患者風俗之敗壊也風俗一敗則筋絡又將絶矣願陛下以春秋為戒而謹持之以祖宗為監而力行之無以草茅之言而罷之則天下幸甚雖然陛下䇿臣等數十條皆當今之大弊也臣已極言之矣而聖䇿尚謂子大夫涉艱險以副詳延誠亦勤矣其必有至言欲為朕陳者其悉言之無隠若乃矜空文而無補於實咎既往而無益於今者非朕之所欲聞也其以朕所未聞而切於時者言之朕將親覽焉臣又有以見陛下真有意求苦口之言以救天下之弊也然臣觀陛下求苦口之言雖若甚切而在廷之士必不敢盡言無諱何哉臣聞鵲巢覆而鳳不至直士受禍則忠臣杜口往者從東南來道路藉藉皆謂陛下即位以來旬月之間戮直言者凡三有是乎豈道路之妄議乎倘如所言則傷威損徳為害不淺謹按春秋陳殺其大夫洩冶説者謂洩冶以直諫被誅國之大惡時盖宣公九年也而十年有徴舒之禍十一年楚子入陳不一年而陳國大亂嗚呼戮直言之士而禍至于此然而洩冶被誅權不在陳靈而在徴舒前日義士被誅權不在陛下而在左右專殺之禍春秋大惡而况專殺直言之士惡又甚焉此楚子入陳所以得藉口而誅徴舒也北國乘隙將假討惡之名而躡入陳之軌矣臣是以卜在朝之士不敢盡言無諱也然而臣猶敢區區竭愚者竊自惟念陛下詔臣等無矜空言而陳實務則陛下知前日濫誅為過而改之是陛下樂聞其過矣臣而不言是負陛下言而不聴是陛下負臣抑臣嘗聞太平興國中有布衣皁囊獻書者其辭狂妄太宗覧之弗罪因謂宰相曰比降詔書許言事故雖狂悖弗加罪至淳化中武程上疏狂瞽李昉請加黜削以懲之太宗因責曰曷常以言罪人哉嗚呼太宗樂聞直言如此而大臣尚請黜直言之士幸而太宗不從如使太宗不樂直言而李昉之請得入焉則武程者俎上肉矣今臣累千萬言則其罪過於皁囊之書以臣疎賤則甚於武程而有狂瞽之論使陛下樂聞直讜尚患見忌借使人主一惡直言大臣如李昉者又從而媒孽之則臣言亦危矣幸陛下以祖宗為監而擴太宗納諫之量大臣體陛下之意而無李昉惡直言之心則畏避而不敢言者亦臣之所竊恥也臣故曰願陛下以春秋為戒而謹持之以祖宗為監而力行之無以草茅之言而罷之則天下幸甚臣謹對澹菴文集巻一
