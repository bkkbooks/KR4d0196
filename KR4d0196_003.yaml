body:
  text: 淡菴文集卷三宋胡銓撰詩題崖州洗兵亭一帶清波六月涼洗兵安用挽天塘哥舒自愧血貫箭子美宜歌苔卧鎗玉壘塵清間擂鼓玳筵人好細流觴淡菴臨水空惆悵洛水凌波見未嘗次雷州和朱彧秀才韻時欲渡海何人著眼覷征驂賴有新詩作指南螺髻層層明晚照蜃樓隱隱倚晴嵐仲連蹈海徒虛語魯叟乘桴亦謾談爭似淡菴乘興往銀山千疊酒微酣和林和靖先生梅韻感時濺淚幾時乾顧影伶俜獨立難自恐迹孤無與對誰憐族冷不勝寒未應一世供愁斷長願三更秉燭看雨過花邊行更好猶嫌子美借銀鞍風亭小立夢初殘步步凌空對廣寒照眼雙明清可掬間情一味淡相看曉縈瑞霧黏初潤晴映髙雲暴未乾三嗅臨風思無限蘂宫遙夜酒初闌瘦吟幽玩有餘妍更向髙人獨樂園無垢未應經露沐不淄寧信受塵昏春風自識明妃面夜雨能清吏部魂插向膽瓶看更好凜如明水薦靁樽一年佳處早梅時鈎引清風巧釣詩未分霜凌禁瘦朵漸看春入奈愁枝晚尤奇特憐無伴夜更分明不可私冷落便須憑酒暖從今鄒律未消吹紛紛紅紫勿相猜自古騷人酷嗜梅皂蓋折花憐老杜黃梅時雨憶方回一生耐凍天憐惜滿世趨炎我獨來桃李爭春身老大急須吟醉莫停杯和張慶符題余作清江引圖痛飲從來别有腸酒酣落筆掃滄浪如今却怕風波惡莫畫清江畫醉鄉何人半醉眼花昏畫出江南煙雨村滿世庾塵遮不得聊將醉墨洗乾坤次張伯麟慶符回首渾如一夢中每思吳越意清通雲間别嶺千層碧日落西湖一抹紅上竺留題陳迹在孤山遊賞故人空莫將句攬幽人思我輩緣詩正坐窮答友人竹間野服情意淡細爇沈水開黃庭秋風忽作世情冷山色似慙君眼青除夜次慶符白髮無端苦見尋十年孤負醉花隂可憐獨鶴逺浮海未羡昏鴉長伴林醉眠天末煙雨夜夢繞江南風雪襟一杯遙祝夀慈母清風不改舊時心余戲作水墨四紙張慶符有詩因用其韻姑熟先生方遣化飢食饞涎餐餅畫信知詩必窮乃工忍窮誰復如公者﨑嶇我已羇江湖僂肩如我世恐無從來畫亦窮乃妙兩窮相值真堪吁平生笑坡誇四板只愛丹青非道眼豈如淡墨出天然雪欲來時水雲晚先生一見輒傾倒回觀濁世秋毫小不須更羡釣魚翁已自超然遊漢表乾道三年九月宴罷晚年種德聽和鸞零落恩深滿菊團金鳳花殘秋欲半木樨香逺晚初寒擬將艾製候朝紱愧把蘆芽易釣竿早與君王乞歸去北途方險戰于鞍萬古雲霄一鳳鸞歸來蓬島月光團平生忠義心中許要使姦雄膽上寒玉露鳴鑾隨儀仗金雞銜赦下長竿天顔催賜黃花酒笑指是翁能據鞍哭趙公鼎以身去國故求死抗疏犯顔今獨艱閣下特書三姓在海南惟見兩翁還一抔孤冢寄瓊島千古髙名屹太山天地只因慳一老中原何日復三關辭朝不踏金堤新築沙却尋寂寞紫雲家一春弦管花間鳥半夜笙歌水底蛙榮瘁安時猶竹柏行藏有待豈匏瓜獨醒正渴杯中物薄薄茅柴亦勝茶家訓有序淳熙庚子四月日詔加資政殿學士致仕是月之望告之祖考會諸姻親暮景至此不亦樂乎頃年經筵蒙玉音曰祖宗創門戶之艱難未有不自子孫不肖破之朕今保太祖之國家亦猶卿子孫他日保卿家門戶也有感於兹斐然縱成古律一通以訓豫之子孫者願世世子孫努力云悲哉為儒者力學不知疲觀書眼欲暗秉筆手生胝無衣兒號寒絶糧妻啼飢文思苦冥搜形容長枯羸俯仰多迍邅多受胯下欺十舉方一第雙鬢已如絲丈夫老且篤焉用富貴為可憐少壯日適在貧賤時沈沈朱門宅中有乳臭兒狀貌如婦人光瑩膏粱肌襁褓襲世爵門承勳戚資前庭列嬖僕出入相追隨千金辦月廩萬錢供賞支後堂擁姝姬早夜同笑嬉錯落開珠翠艷輝沃膏脂粧飾及鷹犬繪綵至薔微青春付杯酒白日消枰棋守俸還酒債堆金選蛾眉朝從博徒飲暮赴娼樓期逢人説門閥樂性惟珍奇絃歌恣娛燕繒綺飾容儀田園日朘削戶門日傾隳聲色遊戲外無餘亦無知帝王是何物孔孟果為誰咄哉驕矜子於世奚所裨不思厥祖父亦曽寒士悲辛苦擢官仕錙銖積家基期汝長富貴豈意遽相衰儒生反堅耐貴遊多流離興亡等一瞬焉須嗟而悲吾宗二百年相承惟禮詩吾蚤仕天京聲聞已四馳樞庭皂囊封琅玕肝膽披但知尊天王焉能臣戎夷新州席未暖珠崖早窮羇輒作賈生哭謾興梁士噫仗節擬蘇武𢋫騷師楚纍龍飛覩大人忽詔衡陽移帝曰爾胡銓無事久棲遲生還天所相直諒時所推更當勉初志用為朕倚毗一月便十遷取官如摘髭記言立螭坳講幄座龍帷草麻賜蓮炬陟爵銜金巵巡邊輒開府御筆親標旗精兵三十萬指顧勞呵麾聞名已宵遁奏功靖方陲歸來笳鼓競虎拜登龍墀詔加端明職賜第江之湄自喜可佚老主上復勤思專禮逮白屋悲非吾之宜四子還上殿擁笏腰帶埀父子拜前後兄弟融怡愈誠由積善致玉音重奬咨資政尊職隆授官非由私吾位等公相吾年將耆頤立身忠孝門傳家清白規但願後世賢努力勤撑持把盞吸明月披襟招涼颸醉墨雖欹斜是為子孫貽淡菴文集卷三
