body:
  text: 淡菴文集卷六宋胡銓撰書答談思順書向者辱箋教扳援河伯海若問答及引孟子觀海難為水遊聖人難為言之論以至正人心之說反覆數百言三復感歎知足下之望於僕也至矣鄉以方有私家戚不即裁答因循至今夫言辭之不酬雖孔子不得行於互鄉况如足下之學識非互鄉之比而又於僕懇懇耶又安得默默而但已哉夫自古論聖人之道以江海為喻者多矣而皆未能盡江海之極致何者以其未嘗識海也銓嘗浮於海矣初自謂世之知海之極致者宜莫如銓今夫海之為器也南灔炎荒北灑璇極東演濛汜西薄月􅒸渺滄溟與渤澥波黏天以漭沆浟湙㶑灔浮空迷岸襄陵廣漠寫膠漫汗彯沙礐石蕩穹沃日頽雲屑雨崩濤捲雪狀如天轂膠戾而激轉倐若坤輿挺定而輻裂飛流濺沫決背股栗其蟲千怪萬狀而不可悉數其鳥獸詭態殊形而不可致詰其舟如凌空之山其帆如埀天之雲千尋之艬萬斛之􅀈巨艦廣􅀈若般若䑽若吳之艅艎艂艭若楚之艨艟飛鶻千艘萬舵舳艫相銜翩若鴻驚瞥若鷗沒飄風一日踔數千里湧不見畔岸決檣摧撞冏然鳥逝吁可畏哉水怪則有海童邀路馬銜當蹊河伯罔象出沒隱見蜃樓忽起突兀萬仭摩雲排空天地黯黯斗變異色則有吞舟之鱷峌􅒈孤遊長鬐梢雲巨鬛刺天哆口修牙劍㦸嵯嵯崇島巨鰲延袤千里擘洪濤榰北斗五嶽鼓舞窮世間萬彚舉不足以盡其變態雖極班彪之覽木華之賦酈元之經盧肇之說韓愈之碑雄辭傑識曽莫能詰其髣佛信乎觀於海者難為水乎知海之難為水則知聖門之難為言亦猶是矣今夫源深者流必洪必至之理也有德者必有言必至之理也難為水者非水之難也其淵源之大為難難為言者非言之難也其德之盛為難德水也言浮物也水之大而物之浮者大小必浮德盛則其言也㫖必逺亦其理也昔者孔子道大而德博其埀世立教非有心於言也而能言之類莫能加焉門弟子能得其微辭奧㫖者寡矣惟許顔回於吾言無所不說至於商也賜也可與言詩雍也然偃也是於漆雕開則說之曽晳則與之亦庶幾矣然子夏之學流而為田子方田子方流而為莊周莊周之書喜稱子方之為人則商雖可與言詩其失也誕子貢之辨多為聖人之所詘至答原憲之問終身恥之則賜雖可與言詩而其失也躁子游習於禮至論本末而子夏以為過則偃雖言是而其失也誣若夫宰豫善為說辭而聖人且有失之子我之譏顓孫師論至恩義善矣而偃也參也皆詆其不仁聖人亦疑其忠信不足有若强識好古能明孝弟善也而於羣弟子之問懵不能對夫數子者皆號升堂入室而不及回也得聖人之所以言其不謂之難乎哉善哉齊太史子與之言曰乃今而後知太山之為高滄海之為大惜乎夫子之道德不加於民也信乎其知聖人之道也銓也學苦而身益窮何足與論聖人之道而足下不以為可鄙乃至扳援古者以發固陋辭義高逺殆非區區者所宜得此也然僕竊有疑焉惜足下不期至於海而自比於河伯而止也夫沿河而下茍不止雖有疾遲必至於海故學者必慎其所道道於曲學異端而欲究聖人之言誠韓愈所謂航斷港絶潢以望至於海也故欲究聖人之言必自韓子始士固伸於知己足下其母謂嘵嘵不一答陳漢臣書銓白解元陳君昨日䝉惠長書齊戒伏誦覺氣格不類海外人文章因請問師友淵源所自而吾子答以常從張慶符學於是知吾子蓋有師承而非若庸庸無模範者僕前在吉陽與伯麟慶符交得慶符詩若文凡百許篇慶符辛未之春自吉陽脫罪罟北歸滯留于瓊者纍嵗甲戌春正月忽沿贑復至吉陽相從纍月歡甚既别三年而僕䝉恩徙衡意謂到瓊當握手道舊寫三年之悲才弛擔即訪問慶符安否聞寓村落距城三四十里病不能出為之悵然者久之兩日前偶於直殿李侯處得書啓兩紙而繼得吾子之書重思慶符而不得見見慶符之所往來者則如慶符焉况吾子親炙其人而其文又有似吾慶符者乎退之見李師錫如見李元賓殆此比也觀吾子之姓名慶符之聲譽恍若夢寐誦吾子之書見慶符之範知師友之不茍也子之言以銓為知命守道不違孔孟者銓豈敢當此蓋庶幾焉而未云有得萬分之一徒喜吾子之學慶符而其文有似於吾慶符也故言之吾子其勉焉將復有深於是者歟銓將南鄉酌酒以賀慶符之席得人也吾子其勉之遺從子維寧書古之君子學欲其日益善欲其日加德欲其日起體欲其日强行欲其日勉心欲其日休道欲其日章以為未也又日知其所亡見其所不見一日不使其躬怠焉其愛日如是足矣猶以為未也必時習焉無一時不習也必時敏焉無一時不敏也必時中焉無一時不中也其競時如是可以已矣猶以為未也則曰夜者日之餘也吾必繼晷焉燈必親薪必燃膏必焚燭必秉蠟必濡螢必照月必帶雪必映光必隙明必借暗則記嗚呼如此極矣然而君子又曰終夜不寢必如孔子雞鳴而起必如大舜坐以待且必如周公然則何時而已耶范寧曰君子之為學也沒身而已矣答溫彥姪書叔銓告秋爽想與諸幼康健領字甚慰老抱昨辱贈别佳句如南朝欲相身方上北國聞風骨已寒不敢當謹藏十萃以無忘蓼蕭數日前傳姪婦違和未的殊在慮叔此粗常唯侍立修史無暇奉訊脫然馳想不若是恝未間力職愛厚叔銓告寵寄佳篇如已聽恩波生茗碗更看皇澤下雞竿意味皆妙難甘不是唐工部竊效猶堪艷繡鞍似覺慊然何也近上庠諸俊有見訪者談吾姪不容口董子羽參入亦稱道不置一第直溷子耳何慊乎哉著鞍一來是望是望頌後薌山頌猗歟薌城層霄可摩視彼喬嶽亦云峨峨德則降神不知其他刻此頌焉與山不磨月中桂頌月中桂美曽君將折桂也桂枝髙髙曄曄其華紅蕊披離少陵詩葩桂枝髙高有蕡其實鷲峰子落秋半之夕桂枝髙髙其影亭亭仰天而攀我思少陵疏蓮花寺修造疏如來燒亦盡只有一羣僧嘗聞其言今覩斯事誰剗堂前一丈草動是荆榛風捲屋上三重茅難安燕雀要見烟生碧瓦除非血染青蚨且莫笑火裏蓮花也須念雨中泥佛蓮花寺重修造疏清涼寶山眷屬萬人之常在金色世界龍天八部之同居正如月住虛空謾道佛須塔廟然而真智無方則一塵滅幻緣有在則三界瞻况如來適當盡焚在衆僧故應作禮我是以收之煨燼加以莊嚴焚其廬而火其書已是遭他毒手歸依佛而歸依法更願拯我頽風一切見聞大家回向修值夏街疏修心莫如修路路若平即是心平安居須念安行行者穩自然居穩願資衆力共闢坦途泰霄觀修殿疏父析薪其子弗克負荷魯史所誅考坐室厥子乃不肯堂周書攸戒每慟卑室久瀆髙真况前代之規模其來甚逺宜後昆之率履可不欽承要識箇木作天何必玉真公主如欲見錢流地豈假銀衣道人自有當仁能辦兹事青原山抄題買田疏㕑乏芳餐多誤食時持鉢生有菜色率當齊後聞鐘何曽螺化為炊動輒魚生於釜敢埀涎於白粲徒夢寐於黃粱念一飽之無時遍十方而請命要託心地廣開福田倘種德之弗深則為仁而不熟惟諸檀越發大慈悲少不嫌貧女一錢多勿吝給孤廣布我欲深耕易耨令居者有積倉剃莽披蓁使世間無寸草一視青原界盡為白望莊稻有麞牙黍多燕頷飽少陵翻匙之雪餐涪翁亂眼之雲必有當仁能辦兹事一犂春雨且剩買埧裏黑牡丹萬頃良田不易喫飯中鐵菱角附長短句浣溪紗忽忽春歸沒計遮百年都似散餘霞持杯聊聽浣溪沙但覺暗添雙鬢雪不知落盡一番花東風寒似夜來些轉調定風波和答海南統領陳康時從古將軍自有真引杯看劍坐生春擾擾介鱗何足掃談笑綸巾羽扇典型新試問天山何日定佇聽雅歌長嘯靜胡塵解道汾陽是人傑見說如今也有謫仙人菩薩蠻辛未七夕戲答張慶符銀河牛女年年渡相逢未款還憂去珠斗欲䦨干盈盈一水間玉人偷拜月苦恨匆匆别此意願天憐今宵長似年减字木蘭花慶符引赦自便已脫去至東界又遭郡中勾回遂有弄璋之喜慶符云嘗夢舅氏知夢吉也豫嘗占慶符當弄瓦賭主人慶符來督故詞中具之渭陽佳夢瓦變成璋真妙弄不是勾回湯餅寃家喚得來不分利市要我開尊真倒置試問坡翁此事如何著得儂醉落魄辛未九月望和答慶符百年強半高秋猶在天南畔幽懷已被黃花亂更恨銀蟾故向愁人滿招呼詩酒顛狂伴羽觴到手判無算浩歌箕踞巾聊岸酒欲醒時興在盧同碗醉落魄和答陳景衛望湖樓見憶千巖競秀西湖好是春時候誰知梅雪飄零久藏白收香空䄂和羔手天涯萬里情難逗眉峰豈為傷春皺片愁未信花能繡若說相思只恐天應瘦鷓鴣天癸酉吉陽用山谷韵夢繞松江屬玉飛秋風蓴美更鱸肥不因入海求詩句萬里投荒亦豈宜青箬笠緑荷衣斜風細雨也須歸崖州險似風波海海裡風波有定時鷓鴣天和陳景衛憶西湖一憶西湖太瘦生十年不到夢曾行空濛山色烟霏晚淡沱湖光霧瀫䡖芳草逺暮雲平雨餘空翠入簾明夢回一餉難存濟這錯都因自打成朝中措黃守座上用六一先生韵崖州何有水連空人在浪花中月嶼一聲橫竹雲帆萬里雄風多情太守三千珠履二肆歌鐘日下即歸黃霸海南長想文翁採桑子甲戌和陳景衛韵山浮海上青螺逺决眥歸鴻間倚東風叠叠層雲欲蕩胸弄琴細寫清江引一洗愁容木杪黃封賢聖都堪日日中臨江僲和陳景衛憶梅我與梅花真莫逆别來長恐因循幾年不見嶺頭青栩然蝴蝶夢魂夢竟非真浪蘂浮花空滿眼愁眉不展長顰此君還似不羈人月邉風伴千里淡相親如夢令誰念新州人老幾度斜陽芳草伏雨欲晴時梅雨故來相惱休惱體惱幾個荔支能好玉樓青贈李都監侍兒是夕歌六么十年目斷鯨波濶萬里相逢歌怨咽髻鬟春霧翠微重眉黛秋山烟雨抹小槽旋滴真珠滑斷送一生花十八醉中扶上木牀兒酒醒夢回空對月清平樂和曾檢法海棠深深花院雨虐風叨遍只缺畫洞簫羽扇誰領略春風靣愁須詩酒相禁少陵底事慵吟不是為梅牽興怕渠惱亂春心王介甫梅詩云少陵為爾牽詩興可是無心賦海棠故云青玉案乙酉重九日葛守座上作冝霜開盡秋光老感莭物愁多少塵世難逢開口笑滿林風雨一江烟水颯爽驚吹帽玉堂金馬何須道且鬪取尊前玉山倒燕寢香清官事了紫茰黃菊皂羅紅袖花與人俱好淡菴文集卷六
