body:
  text: 淡菴文集卷四宋胡銓撰記廬陵先師孔子廟記吉州廬陵古稱大縣唐貞元時有地三百餘里戶餘二萬至熙豐間戶籍號闕萬逮今不啻倍蓰縣當刺史理所凡事難専煩言易生又適兹興法蜂午百姓創罷爬梳不可以夜繼旦為吏牘埋沒至皤頭不得出氣政且不舉何暇及教縣故有先聖廟嵗上丁釋菜府史執事趨如令則正視貌像如土木偶然官之設豈端使然哉今令君老於政事其為治鍵之以勤强練密異時桀黠吏縛不能展手不期月煩言寖聞則笑曰夫其口衆我寡吾知行吾政爾益痛掃溉辦乃公家事小人斬斬逮鰥廩饑以為未至則喟然治黌舍一新廟庭凡宫室不能蔽風雨者自我雕鏤像圖巍然突兀煦映於是廬陵有學可以責士之不來賈生有云移風易俗使天下回心而鄉道類非俗吏之所能為誠有味其言也夫俗吏云者不過曰獄城不得其情刀篋不次於骨箕斂口率不登其時遮迣干掫不中其程吾所汲汲也勸學養士二千石之職也令於何有哉因謂可以無學無學不害則茍而可嗚呼是蓋不知教學政之源養其源則末治徴訟誅斂末也夫民性非本惡彼其强有力者嚚暴悍者盜豈專民之罪哉長上不勸學也父母我民不知勸學至其寡亷鮮恥一落檻穽驟以三尺糾繩之可謂大不仁矣誠能隆師尚賢使民知方彼有恥則可以無訟彼知自愛則可使畫地不入彼知愛上則錢可使不趨而辦我無欲而民興亷則可使雖賞不竊如是則前所謂獄城刀篋口率箕斂遮迣干掫雖寢可也反是雖日撻以求治不可也郡太尹李公鋭於養士得梅池萬鍔為之師令君聞其揮鞞尺建鼓而和之於是市井田野往往樵夫談王道將聞絃歌意丁寧俎豆厭戎馬簿書箠楚且其室若荒涼然則使民回心鄉道不在俗吏矣鍔余同年進士也嘉其意不茍屬余記之書賈生之語以諗焉令君成都王昌故祖岐公之世其家蓋申鮮虞之傳縶焉周濓溪先生祠堂記舂陵太守直閣向公抵書某曰紹興之初豫嘗涖兹土壬子春坐諸司誣鑠罷寓豐城僧舍是秋文定胡公自給事中免歸亦館焉得朝夕請益一日謂豫濓溪先生舂陵人也有遺事乎對以未聞後讀河南語録見程氏淵源自濓溪出乃知先生學極髙明因傳通書誠說味於其所不知兹幸復假守視事三日謁先聖畢語儒官生徒先生天下後世標望誠說具在後學獨不知尊仰是大漏典請建祠講堂後三元閣上皆應曰諾夏四月辛卯繪事僝工闔郡鄉化翕然子其記之某謂自頃興法搶攘刺郡者悉為吏牘埋沒至有難如素王之嘆奚暇教化公下車首尊賢崇雅且懇以誠為言此盛德事某敢以固為辭况伯氏辱知為舊其又奚辭竊聞韓子曰誠者不欺之名程子曰誠者理之實不誠無物言無實也其說始於易成於禮考之曲禮鬼神以誠考之檀弓慎終以誠考之特牲婚禮以誠考之月令工師以誠考之學記教學以誠考之樂記禮經以誠考之祭統祀享以誠考之中庸事親以誠考之大學治天下國家以誠九者一不誠其至也雖堯舜之誠荀卿猶以為僞堯舜豈僞也哉故曰至誠之誠難也禮至誠有五能盡性也能化也前知如神也無息也知天地之化育也是皆實理之極不欺於人故能盡性不欺於物故能化物不欺於神故能如神不欺於已故能無息不欺於天地故能知天地之化育通書之作蓋期學者至於是焉爾其云性者剛柔善惡中而已盡性也云動則變變則化者能化也云寂然不動誠也感而遂通者誠也如神也云君子乾乾於誠者無息也云乾坤交感化生萬物者知天地之化育也知此五者則知禮之所謂誠矣易禮通書其致一也或曰通書叙乾損益動云不息於誠叙家人暌復無妄云無妄則誠是卦皆誠也而漢書又以為易唯乾言誠誠者天之道也然則通書非乎曰否子獨不見夫一六之說乎天以一生水地以六成之一六合而水可見誠則明明則誠誠明合而道可見古之人蓋以誠配一也言誠而止於天猶知一而不知六也按誠說乾元誠之源元亨誠之通利貞誠之復夫乾四德為誠坤屯臨隨無妄革亦四德也不得為誠乎元亨誠之通大有蠱升鼎非誠之通乎利貞誠之復䝉同人大畜離咸遁大壯明夷家人蹇解漸兑渙中孚小過既濟非誠之復乎推此則易非止乾為誠也明矣獨乾言誠者端本之道耳故曰乾元誠之源其㫖微哉公往嵗司風憲湖湘戢吏字民民至今思之以不屈權勢落三十年而所養亦剛大今復觀象濓溪務實去僞豈徒爾空言而已必其由先生之書以明易以合乎曲禮之誠以嚴屏攝合乎檀弓之誠使民送死無憾合乎特牲之誠使民婚姻以禮合乎月令之誠使民器不苦窳合乎學記之誠使民風移俗易合乎樂記之誠使民禮經無僞合乎祭統之誠使民祭則思敬合乎中庸之誠使民養思孝合乎大學之誠使吾政術無頗欺無所不用其誠矣由是而充焉吾知公後日登壇贊元致君堯舜上則盡性也能化也前知如神也無息則久也知天地之化育也宜皆吻合通書之㫖視濓溪其無愧焉濓溪諱敦頤姓周氏紹興二十九年五月日記二友堂記上方側席髙人起左史福唐李公彌遜於釣築間將大用㑹告饑而廬陵特甚詔公作牧以字罷瘵既至櫛垢爬癢民獲蘇郡以大理則求所以慰憊悶者於是視廬之偏得古松蔚然對植以竹開軒其下榜曰二友且為松竹主人命郡人胡銓志之僕曰公山林十有三年窮崖怪壑家猿狖而宫魚龍宜於林木飽聞而厭觀者豈少此二物哉是蓋有說焉孔子曰巧言令色鮮矣仁夫能牧養小民惠鮮鰥寡必剛毅不回之士蓋剛則不奪於欲故曰棖也欲焉得剛而書則曰剛而無虐惟無虐為無欲惟不欲可以言剛惟剛故能行仁公獨有取於松竹焉者非以其德全於剛耶方公閒於簿書日哦其中見夫檀欒膠轕泠風薄人清隂澡慮則思所以大庇我民以浣以濯見夫落落髙標陵轢霜雪有不可犯之色則思所以上列利病與當途要人爭可否而不折見夫幽姿徑質鸞鵠對峙而不受鷃雀則思所以擊奸尚賢使君子有所恃而小人有所畏卒之雨暘以時物物得職威令神行惠澤以流仁周乎骫桑義髙乎偃柏曽不旬嵗而民和年豐是豈巧言令色四體若無骨者所能乎至若心逺地偏境與意㑹萬事不到胸次聽號鍾之松風挹寒塘之竹露道歷物表便有濠濮間趣回視軒冕所謂九萬則風斯在下矣是故可友而不可屈雖然公將羽儀天朝固不能屈之使卑卓然特立臨大節而不可奪以措天下於泰山之安則豈惟無愧二友實丘壑䕫龍之友獲麟記說公羊者以為簫韶作而鳳至春秋成而致麟而王沿亦云王道之成乃致天瑞意鳳凰來儀自然而至也西狩獲麟因狩而獲也麟果為瑞而來則當如鳳之儀於庭不應獲而致也獲者得也不曰麟來而曰麟獲以見窮搜逺討搜原滌藪暴殄天物雖若麟者且不免焉則時可知矣鳳之來儀亦豈如是而見獲耶豈春秋之時亦如舜之時耶使如舜之時則簫韶雖不作而鳳自至如春秋之時雖日奏韶濩而鳳亦逺矣麟自出耶自鳳儀之後舜政日隆自獲麟之後孔子遂卒宗周遂亡然則麟之不為春秋之瑞應彰彰明矣永興觀記銓少時則聞大臯渡所謂永興觀者瀟灑有道山之趣每適城闉過其門則必遊焉住山者王君道貴也與之語類知道者自是相往來為方外友紹興壬戌銓斥嶺表竄海上閲十有三年始內徙合江又五年乃獲自便歸田遊宜春道安成抵螺川涉大臯渡首至永興觀謁王君把酒道舊粲然一笑則謂銓曰自頃一别不知幾寒暑世事如浮雲變滅不可勝紀而吾二人白髮相看如故豈偶然哉請書其事且併記觀之興毁始末以托不腐銓感其言三嘆而遂為之記今夫觀之始自胡君紫槩開山而劉君居明繼之瓦礫之墟變為壇宇百餘年間鐘鼓殷然己酉冬金人長驅江左邑屋一空觀亦煨燼有陳君中陵者披榛剃莽一新土木百廢具舉不十年而陳羽化於是王君奮然大作勝事如里中好事者劉遷吳鑑吳昌劉通出力佐之遂成玉清之居突兀創見而同郡曽仁剩者又出力鳩工揑塑為像既又建三門門側立虎賁之士甚偉逺近聚觀歎息若其殿宇之盛則勢隆崛以崔崒峻峨峨以岋嶪亘修楣之宛紅結枌橑以合沓何其偉也樓觀之盛則隆崇𢎞敷飛櫩䡾䡾望􅌄窱以徑庭眇莫窮其所極何其詭也廊廡之盛則途閣雲蔓隱轔鬱嵂隘百版之側陋嫓殊裁於八都何其壯也雕鏤之盛則髮檻文㮰繡栭藻棁叛赫戲以輝煌蒂倒茄之狎獵何其麗也若夫三階重戺雕齒斫墄坻崿嶙峋棧齴巉嶮雖古馺娑駘蕩燾奡桔桀枍栺承光暌罛庨豁不足擬其靡僝拱梓於林鬱憲紫宫而摹擬嗃寒暑於邃館矗螮霓而聳峙雖疏龍首以抗殿竦造天之危闕不足放其奇朱栱雲浮雕鑾霧飛對若峻嶽崛起以崨嶫宛若春風舒霓以埀天雖表嶤闕於鼎門軼太清以上征不足擬其峻雲爵踶甍而矯首綵羽摛鏤於西清雖束廂蚴蟉之龍圜闕欲翔之鳳不足逾其逸蚩尤呵廬虎旅森㦸靈圉暴於前榮耕甫偃於楯軒雖巨靈贔屭髙掌逺跖如西京之譎河靈矍踢掌華蹈衰如河東之誕不足逞其怪此觀之大凡也雖然豫聞道家者流泊乎無為淡乎自持清淨虛無乃其本也今顧為是紛華盛麗之觀無乃非廣成之道乎王君曰然此真董梧之鋤也敢不聞而藥之紹興壬戌七月朔記序遁齊集序余里人周召挾其有走行在疏朝廷得失號一時强直他日語余將買書歸築齊以遁且以遁名人其謂何余曰易有遁在象為大過春秋不書蓋遁非聖賢之得已也殆如詩考槃考槃賢者不得志退而處窮者作也子以一介草茅一言而善廟堂擇焉使待試禮部則與衛之賢者不得志於時者異矣而欲遁焉左也雖然是固在已衆方炙轂以味進已獨脫屣塵軫作沐猴禪正自不惡請因考槃之義以鍵子之訣考槃賢者處澗阿能成其樂者也其章言永矢弗諼永矢弗過永矢弗告鄭子云弗諼不忘君之意弗過不入君朝弗告不告君以善道也歐陽子云弗諼不忘隱處之樂弗過獨樂不他適也弗告不告人以此樂也伊川子云弗諼不忘君弗過傷不得過君之朝弗告不得告以善也從鄭說則流而為行吟塗笑鬱而獨嗔者之為也從歐陽說則流而為槁木凍炭往而不返者之為也從伊川說則流而為假隱釣名是巖壑而志城闕者之為也是三樂者將安從子歸闡繹優游異不及非怨不及誹有合於吾易嘉好之吉則善矣反是君子或所不取跋跋鄭亨仲樞密送邢晦詩紹興丁巳公與銓同為編修官密院戊午夏又同考較省闈訖事攝都司除殿中侍御史遷中執法冬金人以僞詔授我欲屈無隄之輿下拜以受從之公與銓力爭不可言頗訐上震怒詔褫銓爵投昭州公奮然曰吾嘗同僚決不使邦衡獨斥夜半與諫議大夫李誼宜言吏部尚書晏敦復景初戶部侍郎李彌遜似之向子諲伯恭禮部侍郎曽開大猷張九成子韶對便坐引救上稍稍霽威右相秦檜參知政事孫近激公義亦即時入對乞從公等臺諫侍從請上賜可銓得釋謫廣州監鹽倉公又引大義折檜遂有量與録用之請除銓僉書福唐幕辛酉到官壬戌秋閩帥程邁中銓以飛語復投嶺表己巳春新州張棣承廣帥王鈇風㫖劾奏銓移海外未幾公自泗州宣撫被遣徙桂陽又徙封州亦坐鈇之譛也乙亥夏病不起銓方居海島愧不能效欒布與敞脂之收葬以報公恩抱恨千古丙子夏銓䝉恩徙衡戊寅冬公之壻郴司戶邢晦德昭罷官過鴈峰出示公遺墨讀之澘然出涕屬有悼亡之戚不克繼韻輒書舊所作楚詞於後蓋上以為天下慟而下以哭其私也山峩兮水深懷髙風兮涕漸我襟無復若人兮青規黃閣康瓠登庸兮黃鍾攘却死者不可作兮云誰與歸謂斯文之不遭兮莫如我悲恭覽遺墨風雅具體彼羊質䝉臯比兮其顙有泚跋醉鄉圖余既作醉鄉圖或云醉鄉不可名狀圖何有哉余笑答曰子非無功安知無功鄉也吉州僧契崇謁余於淡菴乞一言為别以是遺之可持歸作衣鉢一笑崇師雖浮屠人專以詩律作佛事似亦有意醉鄉卜鄰紹興闕五月癸巳淡菴文集卷四
