body:
  text: 淡菴文集附録本傳胡忠簡公銓字邦衡廬陵值夏人自幼以通特知名嘗從鄉先生蕭楚學春秋盡得其指宋建炎二年高宗䇿士維揚問治道本天天道本民公對萬言湯武以民而興桀紂以天而亡今陛下起干戈鋒鏑間外亂內訌而䇿臣數十條皆質之天不聽於民詞多切直髙宗異之將冠多士忌者移置第五授撫州軍事判官未上㑹隆祐太后避兵贛州金人躡之公裒氓為兵按其衡轉承直郎擢吉州軍事判官以父喪歸紹興五年督府張浚辟之不赴兵部尚書吕祉以賢良方正薦賜對除編修官八年宰臣秦檜主和金使以詔諭江南為名中外洶洶公抗疏言曰臣謹按王倫本一狎邪小人市井無賴頃緣宰相無識遂舉以使敵專務詐誕欺罔天聽驟得美官天下之人切齒唾罵今者無故誘致敵使以詔諭江南為名是欲臣妾我也是欲劉豫我也劉豫臣事北國南面稱王自以為子孫帝王萬世不拔之業一旦敵人改慮捽而縛之父子為囚殷鑑不逺而倫又欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為強敵之天下以祖宗之位為強敵藩臣之位陛下一屈膝則祖宗廟社之靈盡汙草莽祖宗數百年之赤子盡為左衽朝廷宰執盡為陪臣天下士大夫皆當裂冠毁冕變為異服異時敵人無厭之求安知不加我以無禮如劉豫也哉夫三尺童子至無識也指所仇而使之拜則怫然怒今北敵則仇讐也堂堂大國相率而拜仇讐曽童孺之所羞而陛下忍為之耶倫之議乃曰我若屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此說啖陛下哉然而卒無一驗則敵之情僞已可知矣陛下尚不覺悟竭民膏血而不恤忘國大讎而不報含垢忍恥舉天下而臣之甘心焉就令彼決可和盡如倫議天下後世謂陛下何如主况北人變詐百出而倫又以姦邪濟之梓宫決不可還太后決不可復淵聖決不可歸中原決不可得而此膝一屈不可復伸國勢淩夷不可復振可為痛哭流涕長太息矣向者陛下間關海道危如纍卵當時尚不忍北面臣敵况今國勢稍張諸將盡鋭士卒思奮如頃者北敵陸梁僞豫入冦固嘗敗之於襄陽敗之於淮上敗之於渦口敗之於淮隂較之往時蹈海之危固已萬萬儻不得已而用兵則我豈遽出敵人下哉今無故而反臣之欲屈萬乘之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連所以義不帝秦非惜夫帝秦之虛名惜天下大勢有所不可也今內而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦為之陛下有堯舜之資檜不能致君如唐虞而欲導陛下為石晉近者禮部侍郎曽開引古誼以折之檜乃厲聲責曰侍郎知故事我獨不知則檜之遂非愎諫已自可見而乃建白令臺諫侍臣僉議可否是蓋畏天下議已而令臺諫侍臣共分謗耳有識之士皆以為朝廷無人吁可惜哉孔子曰微管仲吾其披髮左衽矣夫管仲霸者之佐耳尚能變左祍之區而為衣裳之㑹秦檜大國之相也反驅衣冠之俗而為左衽之鄉則檜也不唯陛下之罪人實管仲之罪人矣孫近傅㑹檜議遂得參知政事天下望治有如饑渴而近伴食中書漫不敢可否事檜曰敵可和近亦曰可和檜曰天子當拜近亦曰當拜臣嘗至政事堂三發問而近不答但曰已令臺諫侍從議矣嗚呼參贊大政徒取充位如此有如敵騎長驅尚能折衝禦侮耶臣竊謂秦檜孫近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斬三人頭竿之藁街然後羇留敵使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死爾寧能處小朝廷求活耶書上檜以公狂悖鼓衆除名編管昭州臺諫多救之者檜迫於公論乃以公監廣州鹽倉明年改簽書威武軍判官十二年諫官羅汝楫劾公飾非橫議詔除名編管新州十八年新州守張棣訐公謗訕怨望移謫吉陽軍二十六年檜死移衡州初吳師古鋟公疏金人募之千金陳剛中以啓送之甚為稱譽王廷圭亦以詩贈或告檜師古流袁州廷圭流辰州剛中謫安逺縣死焉孝宗即位復奉議郎知饒州召對言修德結民練兵觀釁帝曰久聞卿直諒除吏部郎官遷祕書少監擢起居郎公奏曰臣承乏左右史竊見史失職者非一尤甚者有四昔唐太宗欲觀史褚遂良以為不可恐史臣諱避不敢直書耳則記注不必呈也唐制皇帝御殿左右史夾列善惡必書許敬忠李義府用事改立於殿東南隅於是人主言動不得聞則舊制宜復也夫左右史侍天子之側非有前後殿之分也今獨侍後殿而前殿不與義果安在則前殿宜立也昔文宗謂魏謨曰事有不當毋嫌論奏故國朝左右史皆許前奏事皇祐中唐介論文彥博帝怒時蔡襄修起居注直前論救又曷嘗預牒閣門與必俟班次耶則奏宜直前也詔從之兼侍講國史院編修官公請都建康其略言漢高入關中光武守信都夫與人鬬不扼其吭拊其背不能全勝今日大勢自淮以北天下之吭與背也建康則扼之拊之之地也若進據建康下臨中原此髙光興王之計也張浚王十朋克復宿州將李顯忠與邵宏淵忿爭軍大潰十朋自劾帝怒甚公疏願毋以小衄自沮尋因灾異求言公應詔上書大略舉春秋灾異以明政令之闕及上下之情不合各有十且言堯舜明四目達四聰雖有共鯀不能塞也秦二世以趙高為腹心劉項橫行而不得聞漢成帝殺王章王氏移鼎而不得聞靈帝殺何武陳蕃天下橫潰而不得聞梁武信朱異侯景斬關而不得聞隋煬帝信虞世基李密稱帝而不得聞唐明皇逐張九齡安史胎禍而不得聞陛下昔召臣及張燾辛次膺王大寶王十朋並入今燾與次膺十朋相繼去大寶亦且行矣獨臣在爾以言為諱而欲塞灾異之源臣知其必不得也公又言昔周世宗為劉旻所敗斬失律將何徽等七十人軍威大震卒敗旻取淮南定三關夫一日戮七十將豈復有將可用而世宗終能恢復豈非庸懦者去則勇敢者出耶近宿州之敗士死敵者滿野而諸將以金賂權貴自解天變昭然惟陛下信賞必罰以應天變今廷臣以箝默為賢容悅為忠馴至興元之幸所謂一言喪邦帝曰非卿不聞此金人求成公曰金人知陛下鋭意恢復故以甘言欵我願絶口勿言和帝以邊事倚張浚而王之望尹穡專主和排浚銓廷責之尋兼權中書舍人同修國史詔問廷臣和戎可否時主和者半兩持者半言和不可者公一人而已乃上疏陳其狀言京師失守自耿南仲主和二聖播遷自何桌日人人主和維揚失守自汪伯彥黃潜善主和完顔亮之變自秦檜主和議者乃曰外雖和而內不忘戰此權臣誤國之言一溺於和不能自振尚能戰乎除宗正少卿乞補外不許先是金將以泗州及軍百人降詔並為節度使公言受降古所難六朝七得河南之地不旋踵而皆失梁武時侯景以河南來奔未幾而陷臺城宣政間郭藥師自燕雲來降未幾為中國患今金三將內附苐髙其爵祿優其部曲以繫中原之心則可若處之近地萬一包藏禍心潜為內應後將噬臍願勿任以兵柄遷其衆於湖廣以絶後患二年兼國子祭酒尋降權兵部侍郎帝以災異詔廷臣言闕政急務公以賑災為急務議和為闕政其書曰自靖康迄今凡四十年三遭大變皆在和議則敵人之不可與和明矣肉食鄙夫萬口一談牢不可破非不知和之害而爭言為和者有三說焉曰偷懦曰茍安曰附㑹偷懦則不知立國茍安則不戒鴆毒附㑹則覬得美官小人之情狀具於此矣今日之議若成則有可弔者十若不成則有可賀者亦十請為陛下極言之何謂可弔者十真宗時宰相李沆謂王旦曰我死公必為相切勿與敵和吾聞出則無敵國外患如是者國恆亡若與敵和自此中國必多事矣旦殊不以為善既而遂和海內虛耗旦始悔不用文靖之言此可弔者一也中原謳吟思歸之人日夜引領望陛下拯溺救焚不啻赤子之望慈父母一與敵和則中原絶望後悔何及此可弔者二也海泗今日之籓籬咽喉也彼得海泗且決吾籓籬以瞰吾室扼吾咽喉以制吾命則兩淮決不可保兩淮不保則大江決不可守大江不守則江浙決不可安此可弔者三也紹興戊午和議既成檜建議遣二三大臣如路允迪等分往南京等州交割歸地一旦叛盟劫執允迪等遂下親征之詔彼復請和其反覆變詐如此檜猶不悟奉之如初事之愈謹賂之愈厚卒有金亮之變驚動輦轂太上謀欲入海行朝居民一空覆轍不逺忽而不戒臣恐後車又將覆也此可弔者四也紹興之和首議決不與歸正人口血未乾盡變前議凡歸正之人一切遣還如程師回趙良嗣等聚族數百幾為蕭牆憂今必盡索歸正之人與之則反側生變不與則敵決不肯但已夫反側則肘腋之變深敵決不肯但已則必别起釁端猝有金亮之謀不知何以待之此可弔者五也自檜當國二十年間竭民膏血以餌仇讐迄今府庫無旬日之儲千村萬落生理蕭然重以蝗蟲水潦自此復和則蠧國害民殆有甚焉者矣此可弔者六也今日之患兵費已廣養兵之外又增嵗幣且少以十年計之其費無慮數千億而嵗幣之外又有私覿之費私覿之外又有賀正生辰之使賀正生辰之外又有泛使一使未去一使復來生民疲於奔命帑廩涸於將迎瘠中國以肥敵陛下何憚而為之此其可弔者七也側聞敵人過望欲書御名欲去國號大字欲用再拜議者以為繁文小節不必計較臣竊以為議者可斬也夫四郊多壘卿大夫之辱楚子問鼎義士之所深恥獻納二字富弼以死爭之今敵人橫行與多壘孰辱國號大小與鼎輕重孰多獻納二字與再拜孰重臣子欲君父屈己以從之則是多壘不足辱問鼎不必恥獻納不必爭此其可弔者八也臣恐再拜不已必至稱臣稱臣不已必至請降請降不已必至納土納土不已必至銜璧銜璧不已必至輿櫬輿櫬不已必至如晉帝青衣行酒然後為快此其可弔者九也事至於此求為匹夫尚可得乎此其可弔者十也竊觀今日之勢和決不成儻乾剛獨斷追回使者魏杞康湑等絶請和之議以鼓戰士下哀痛之詔以收民心天下庶乎其可為矣如此則有可賀者亦十省數千億之嵗幣一也專意武備足食足兵二也無書名之恥三也無去大之辱四也無再拜之屈五也無稱臣之忿六也無請降之禍七也無納土之悲八也無銜璧輿櫬之酷九也無青衣行酒之寃十也去十弔而就十賀利害較然雖三尺童稚亦知之而陛下不悟春秋左氏謂無勇者為婦人今日舉朝之士皆婦人也如以臣言為不然乞賜流放竄殛以為臣子出位犯分之戒自符離之敗以棄唐鄧海泗四州與金金又欲得商秦地邀嵗幣留使者魏杞分兵攻淮於是命公措置浙西淮東海道時金兵號八十萬劉寶棄楚州王彥棄昭關濠滁皆陷惟高郵守臣陳敏拒敵射陽湖而大將李寶預求密詔為自安計擁兵不救公劾奏之曰臣受詔令范榮備淮李寶備江緩急相援今寶視敏弗救若射陽失守大事去矣寶懼始出師犄角時大雪河冰皆合公先持鐵鎚鎚冰士皆用命金人遂退乾道初以集英殿修撰知漳州改全州入奏事留為工部侍郎公曰陛下嘗許臣誓不與金和何為中變又謂臣決移蹕建康何為中輟上曰以民之不易少須公曰少康以一旅復禹蹟陛下富有四海即位九年恥尚未復且四方水旱請令有司速為備歷敷文閣直學士嘗宴見言初經筵之臣七人惟臣獨在臣老矣願乞身歸田里上問今安歸對曰臣廬陵人向在嶺海訓傳諸經欲成此書特賜犀帶寵之歸上所著易春秋周禮禮記解詔藏祕書省纍轉朝奉郎進封開國伯又進封郡侯淳熙六年召赴行在所辭不許遂力疾轉朝議大夫久之以資政殿學士致仕明年卒口授遺表有死為厲鬼殺賊之語表聞特贈通議大夫嘗名其菴曰淡取賈生淡若深淵意有淡菴集一百卷孫規矩皆官至尚書宋史本傳胡銓字邦衡廬陵人建炎二年高宗䇿士淮海銓因御題問治道本天天道本民答云湯武聽民而興桀紂聽天而亡今陛下起干戈鋒鏑間外亂內訌而䇿臣數十條皆質之天不聽於民又謂今宰相非晏殊樞密參政非韓琦杜衍范仲淹䇿萬餘言髙宗見而異之將冠之多士有忌其直者移置第五授撫州軍事判官未上㑹隆祐太后避兵贑州金人躡之銓以漕檄攝本州幕募鄉丁助官軍捍禦第賞轉承直郎丁父憂從鄉先生蕭楚學春秋紹興五年張浚開督府辟湖北倉屬不赴有詔赴都堂審察兵部尚書呂祉以賢良方正薦賜對除樞密院編修官八年宰臣秦檜決䇿主和金使以詔諭江南為名中外洶洶銓抗疏言曰臣謹案王倫本一狎邪小人市井無賴頃緣宰相無識遂舉以使敵專務詐誕欺罔天聽驟得美官天下之人切齒唾罵今者無故誘致敵使以詔諭江南為名是欲臣妾我也是欲劉豫我也劉豫臣事北狄南面稱王自以為子孫帝王萬世不拔之業一旦敵人改慮捽而縛之父子為囚商鑑不逺而倫又欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為仇敵之天下以祖宗之位為仇敵藩臣之位陛下一屈膝則祖宗廟社之靈盡汙草莽祖宗數百年之赤子盡為左袵朝廷宰執盡為陪臣天下士大夫皆當裂冠毁冕變為異服異時敵人無厭之求安知不加我以無禮如劉豫也哉夫三尺童子至無識也指所仇而使之拜則怫然怒今北敵則仇讐也堂堂大國相率而拜仇讐曽童孺之所羞而陛下忍為之耶倫之議乃曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此說啖陛下哉然而卒無一驗則敵之情僞已可知矣而陛下尚不覺悟竭民膏血而不恤忘國大讎而不報含垢忍恥舉天下而臣之甘心焉就令彼決可和盡如倫議天下後世謂陛下何如主况北人變詐百出而倫又以姦邪濟之梓宫決不可還太后決不可復淵聖決不可歸中原決不可得而此膝一屈不可復伸國勢陵夷不可復振可為痛哭流涕長太息矣向者陛下間關海道危如纍卵當時尚不忍北面臣敵况今國勢稍張諸將盡鋭士卒思奮只如頃者北敵陸梁僞豫入冦固嘗敗之於襄陽敗之於淮上敗之於渦口敗之于淮隂校之往時蹈海之危固已萬萬儻不得已而至於用兵則我豈遽出敵人下哉今無故而反臣之欲屈萬乘之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連所以義不帝秦非惜夫帝秦之虛名惜天下大勢有所不可也今內而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦為之陛下有堯舜之資檜不能致君唐虞而欲導陛下為石晉近者禮部侍郎曽開等引古誼以折之檜乃厲聲責曰侍郎知故事我獨不知則檜之遂非愎諫已自可見而乃建白令臺諫侍臣僉議可否是蓋畏天下議已而令臺諫侍臣共分謗耳有識之士皆以為朝廷無人吁可惜哉孔子曰微管仲吾其被髮左袵矣夫管仲霸者之佐耳尚能變左袵之區而為衣裳之㑹秦檜大國之相也反驅衣冠之俗而為左袵之鄉則檜也不惟陛下之罪人實管仲之罪人矣孫近傳㑹檜議遂得參知政事天下望治有如饑渴而近伴食中書漫不敢可否事檜曰敵可和近亦曰可和檜曰天子當拜近亦曰當拜臣嘗至政事堂三發問而近不答但曰已令臺諫侍從議矣嗚呼參贊大政徒取充位如此有如敵騎長驅尚能折衝禦侮耶臣竊謂秦檜孫近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斷三人頭竿之藁街然後羈留敵使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死爾寧能處小朝廷求活耶書既上檜以銓狂妄凶悖鼓衆劫持詔除名編管昭州仍降詔播告中外給舍臺諫及朝臣多救之者檜迫於公論乃以銓監廣州鹽倉明年改簽書威武軍判官十二年諫官羅汝楫劾銓飾非橫議詔除名編管新州十八年新州守臣張棣訐銓與客唱酬謗訕怨望移謫吉陽軍二十六年檜死銓量移衡州銓之初上書也宜興進士吳師古鋟木傳之金人募其書千金其謫廣州也朝士陳剛中以啓事為賀其謫新州也同郡王廷圭以詩贈行皆為人所訐師古流袁州廷圭流辰州剛中謫知䖍州安逺縣遂死焉三十一年銓得自便孝宗即位復奉議郎知饒州召對言修德結民練兵觀釁上曰久聞卿直諒除吏部郎官隆興元年遷祕書少監擢起居郎論史官失職者四一謂記注不必進呈庶人主有不觀史之美二謂唐制二史立螭頭之下今在殿東南隅言動未嘗得聞三謂二史立後殿而前殿不立乞於前後殿皆分日侍立四謂史官欲其直前而閣門以未嘗預牒以今日無班次為辭乞自今直前言事不必預牒閣門及以有無班次為拘詔從之兼侍講國史院編修官因講禮記曰君以禮為重禮以分為重分以名為重願陛下無以名器輕假人又進言乞都建康謂漢髙入關中光武守信都大扺與人鬬不扼其吭拊其背不能全勝今日大勢自淮以北天下之吭與背也建康則扼之拊之之地也若進據建康下臨中原此高光興王之計也詔議行幸言者請紓其期遂以張浚視師圖恢復侍御史王十朋贊之克復宿州大將李顯忠私其金帛且與邵宏淵忿爭軍大潰十朋自劾上怒甚銓上疏願毋以小衄自沮時旱蝗星變詔問政事闕失銓應詔上書數千言始終以春秋書災異之法言政令之闕有十而上下之情不合亦有十且言堯舜明四目達四聰雖有共鯀不能塞也秦二世以趙高為腹心劉項橫行而不得聞漢成帝殺王章王氏移鼎而不得聞靈帝殺何武陳蕃天下橫潰而不得聞梁武信朱異侯景斬關而不得聞隋煬帝信虞世基李密稱帝而不得聞唐明皇逐張九齡安史胎禍而不得聞陛下自即位以來號召逐客與臣同召者張燾辛次膺王大寶王十朋今燾去矣次膺去矣大寶又將去惟臣在爾以言為諱而欲塞災異之源臣知其必不能也銓又言昔周世宗為劉旻所敗斬敗將何徽等七十人軍威大震果敗旻取淮南定三關夫一日戮七十將豈復有將可用而世宗終能恢復非庸懦者去則勇敢者出耶近宿州之敗士死于敵者滿野而敗軍之將以所得之金賂權貴以自解上天見變昭然陛下非信賞必罰以應天不可其論納諫曰今廷臣以箝默為賢容悅為忠馴至興元之幸所謂一言喪邦上曰非卿不聞此金人求成銓曰金人知陛下鋭意恢復故以甘言欵我願絶口勿言和字上以邊事全倚張浚而王之望尹穡專主和排浚銓廷責之兼權中書舍人同修國史張浚之子栻賜金紫銓繳奏之謂不當如此待勳臣子浚雅與銓厚不顧也十一月詔以和戎遣使大詢于庭侍從臺諫預議者凡十有四人主和者半可否者半言不可和者銓一人而已乃獨上一議曰京師失守自耿南仲主和二聖播遷自何桌日人人主和維揚失守自汪伯彥黃潜善主和完顔亮之變自秦檜主和議者乃曰外雖和而內不忘戰此向來權臣誤國之言也一溺於和不能自振尚能戰乎除宗正少卿乞補外不許先是金將蒲察徒穆大周仁以泗州降蕭琦以軍百人降詔並為節度使銓言受降古所難六朝七得河南之地不旋踵而皆失梁武時侯景以河南來奔未幾而陷臺城宣政間郭藥師自燕雲來降未幾為中國患今金之三大將內附高其爵祿優其部曲以繫中原之心善矣然處之近地萬一包藏禍心或為內應後將噬臍願勿任以兵柄遷其衆於湖廣以絶後患二年兼國子祭酒尋除權兵部侍郎八月上以災異避殿減膳詔廷臣言闕政急務銓以振災為急務議和為闕政其議和之書曰自靖康迄今凡四十年三遭大變皆在和議則金人之不可與和彰彰明矣肉食鄙夫萬口一談牢不可破非不知和議之害而爭言為和者是有三說焉曰偷懦曰茍安曰附㑹偷懦則不知立國茍安則不戒鴆毒附㑹則覬得美官小人之情狀具於此矣今日之議若成則有可弔者十若不成則有可賀者亦十請為陛下極言之何謂可弔者十真宗皇帝時宰相李沆謂王旦曰我死公必為相切勿與敵講和吾聞出則無敵國外患如是者國常亡若與敵和自此中國必多事矣旦殊不以為然既而遂和海內乾耗旦始悔不用文靖之言此可弔者一也中原謳吟思歸之人日夜引領望陛下拯溺救焚不啻赤子之望慈父母一與敵和則中原絶望後悔何及此可弔者二也海泗今日之藩籬咽喉也彼得海泗且決吾藩籬以瞰吾室扼吾咽喉以制吾命則兩淮決不可保兩淮不保則大江決不可守大江不守則江浙決不可安此可弔者三也紹興戊午和議既成檜建議遣二三大臣如路允迪等分往南京等州交割歸地一旦叛盟劫執允迪等遂下親征之詔彼復請和其反覆變詐如此檜猶不悟奉之如初事之愈謹賂之愈厚卒有金亮之變驚動輦轂太上謀欲入海行朝居民一空覆轍不逺忽而不戒臣恐後車又將覆也此可弔者四也紹興之和首議決不與歸正人口血未乾盡變前議凡歸正之人一切遣還如程師回趙良嗣等聚族數百幾為蕭牆憂今必盡索歸正之人與之則反側生變不與則敵決不肯但已夫反側則肘腋之變深敵決不肯但已則必别起釁端猝有金亮之謀不知何以待之此可弔者五也自檜當國二十年間竭民膏血以餌仇讎迄今府庫無旬月之儲千村萬落生理蕭然重以蝗蟲水潦自此復和則蠧國害民殆有甚焉者矣此可弔者六也今日之患兵費已廣養兵之外又增嵗幣且少以十年計之其費無慮數千億而嵗幣之外又有私覿之費私覿之外又有賀正生辰之使賀正生辰之外又有泛使一使未去一使復來生民疲於奔命帑廩涸於將迎瘠中國以肥敵陛下何憚而為之此其可弔者七也側聞敵人嫚書欲書御名欲去國號大字欲用再拜議者以為繁文小節不必計較臣竊以為議者可斬也夫四郊多壘卿大夫之辱楚子問鼎義士之所深恥獻納二字富弼以死爭之今強敵橫行與多壘孰辱國號大小與鼎輕重孰多獻納二字與再拜孰重臣子欲君父屈己以從之則是多壘不足辱問鼎不必恥獻納不必爭此其可弔者八也臣恐再拜不已必至稱臣稱臣不已必至請降請降不已必至納土納土不已必至銜璧銜璧不已必至輿櫬輿櫬不已必至如晉帝青衣行酒然後為快此其可弔者九也事至於此求為匹夫尚可得乎此其可弔者十也竊觀今日之勢和決不成儻乾綱獨斷追回使者魏杞康湑等絶請和之議以鼓戰士下哀痛之詔以收民心天下庶乎其可為矣如此則有可賀者亦十省數千億之嵗幣一也專意武備足食足兵二也無書名之恥三也無去大之辱四也無再拜之屈五也無稱臣之忿六也無請降之禍七也無納土之悲八也無銜璧輿櫬之酷九也無青衣行酒之寃十也去十弔而就十賀利害較然雖三尺童稚亦知之而陛下不悟春秋左氏謂無勇者為婦人今日舉朝之士皆婦人也如以臣言為不然乞賜流放竄殛以為臣子出位犯分之戒自符離之敗朝論急於和戎棄唐鄧海泗四州於金矣金又欲得商秦地邀嵗幣留使者魏杞分兵攻淮以本職措置浙西淮東海道時金使僕散忠義紇石烈志寧之兵號八十萬劉寶棄楚州王彥棄昭關濠滁皆陷惟高郵守臣陳敏拒敵射陽湖而大將李寶預求密詔為自安計擁兵不救銓劾奏之曰臣受詔令范榮備淮李寶備江緩急相援今寶視敏弗救若射陽失守大事去矣寶懼始出師犄角時大雪河冰皆合銓先持鐵鎚鎚冰士皆用命金人遂退久之提舉太平興國宫乾道初以集英殿修撰知漳州改泉州趣奏事留為工部侍郎入對言少康以一旅復禹績今陛下富有四海非特一旅而即位九年復禹績之效尚未赫然又言四方多水旱左右不以告謀國者之過也宜令有司速為先備乞致仕七年除寶文閣待制留經筵求去以敷文閣直學士與外祠陛辭猶以歸陵寢復故疆為言上曰朕志也且問今何歸銓曰歸廬陵臣向在嶺海嘗訓傳諸經欲成此書特賜通天犀帶以寵之銓歸上所著易春秋周禮禮記解詔藏祕書省尋復元官升龍圖閣學士提舉太平興國宫轉提舉玉龍萬夀宫進端明殿學士提舉六年召歸經筵銓引疾力辭七年以資政殿學士致仕薨諡忠簡有淡菴集一百卷行于世孫規矩皆至尚書資政殿學士贈通奉大夫胡忠簡公銓神道碑武王一戎衣而定天下應天順人之舉也義士猶或非之孔孟奚取焉為萬世計也紹興和戎高皇有不得已者矣兩宫未歸母后春秋已髙故與大臣決䇿從權中外議論雖洶洶顧無敢直陳於上前者獨樞密院編修官胡銓上書數百言援大義而伸之大略謂王倫誘致北使欲劉豫我秦檜腹心大臣導陛下為石晉孫近傅㑹遂參政事願竿三人頭羈留北使興問罪之師時八年十一月辛亥有旨銓書凶悖劫持其削籍流昭州仍降詔布告中外是日檜近惶恐待罪明日又請收責命不許則乞從末減十二月王倫亦再上章自劾而六曹長二給舍臺諫自晏景初而下多有救解者乃改監廣州都鹽倉明年正月宰執復奏銓書專詆臣等前和議未諧不敢固請以疑羣心今議已定宜稍甄叙乙酉遂改簽書威武軍節度判官㕔公事十一年六月之官十二年七月諫議大夫羅汝楫劾公益倡前說用欺羣聽復除其名勒停編管新州十八年十一月郡守張棣奏公與客唱酬毁謗怨望移吉陽軍時大臣專國柄小人望觀迎合必欲置公死地賴天子獨保全之二十五年冬秦丞相薨乃得歸某竊惟人臣犯顔逆耳上攖人主之怒下為權臣切齒或誅或斥何可勝數未有九重特申詔諭三府矯情屢請禁近引誼救止曽不四旬謫命三改如朝廷此舉之盛者當是時一胡編修名震天下勇者服怯者奮朝士陳剛中以言餞行至云膝屈請和廟堂無䇿張膽論事樞庭有人貶令安逺之死靡憾鄉人王廷圭嘗賦姦諛膽落之詩竄徙夜郎反以為榮下至武夫悍卒遐方裔土莫不傳誦其書樂道其姓氏爭願識面雖北人亦因是知中國之不可輕蓋天理所存自公達之人心所憤自公發之扶世埀教非聖朝之伯夷耶孔孟而在其大書特書也必矣胡氏本金陵人五季徙廬陵公字邦衡曽祖連妣康氏劉氏祖愷贈承務郎妣孺人張氏父載有氣節一試有司不中即棄去贈太中大夫母陳氏張氏所生母曽氏俱贈淑人公幼不羣强記博覽年二十試太學文不加㸃建炎二年廷對行在所考官初以冠多士或畏其切直置第五授左文林郎撫州軍事判官未上隆祐太后避敵上贑敵師隨之公以發運司檄攝本州募官率鄉丁佐官軍扞止第賞循承直郎就權判官尋丁父憂服除與兄鑄從鄉先生蕭楚講春秋學無仕進意紹興五年張忠獻公都督諸路軍馬辟湖北常平茶鹽司幹辦公事以親嫌易河南提㸃刑獄司俱未行召赴都堂審察七年兵部尚書呂祉以賢良方正薦四月賜對改左通直郎留為樞屬後二年赴福州才一年踰嶠又六年過海守棣驅公使步往又諭送吏侵公公不為動吏無所肆其毒既抵珠崖著書怡然不以死生介意士執經從學多可觀預貢者相繼赴南宫其後公還朝復請五至省者許勿限年推恩自是海島頗有仕宦者閲七年始量移衡州又數年乃許自便三十二年夀皇即位復左奉議郎知饒州十二月入對乞修德結民心練兵觀敵釁上曰久聞卿直諒拜吏部尚書左郎官隆興元年正月遷祕書少監四月擢起居郎兼侍講國史編修官論記注不應進藁前後殿皆當侍立遇直前毋白閣門毋隔班次又請移都金陵時督府北伐克宿州大將李顯忠邵宏淵敗歸勸上毋以小衄自沮七月旱蝗星變求直言公請勿徼福佛老躬行周宣王故事罰監司守令之貪殘者其論納諫曰今廷臣以箝默為賢容悅為忠反謂臺諫論事為賣直此德宗疑姜公輔之語也馴致興元之幸所謂一言喪邦者上曰非卿不聞此金人再求和公曰敵知陛下鋭意恢復故以甘言詭計欵我願絶口不言和字上嘆其忠直侍郎王之望侍御史尹穡皆主和排張忠獻公公廷責之聞者稱快兼權中書舍人特升同修國史公雖與忠獻善及其子栻賜金紫則謂不當如待勳臣子繳奏之太上皇后改稱教㫖為聖㫖公奏大哉乾元至哉坤元今乃一之將如太上皇帝何上曰奉親之過朕當自受十一月詔以和戎利病遣使可否禮文後先土疆取豫大要詢禁近或勸公從衆公奮曰古有斷頭將軍無降將軍乃上奏曰京師失守自耿南仲主和靖康播遷自何桌日人人主和維揚失守自汪伯彥黃潜善主和完顔亮之變自秦檜主和議者乃曰外雖和內不忘戰此又向來權臣誤國之言也一溺於和將士解體尚能戰乎執政讀之失色㑹中貴人推金字牌賞越舊制公索成法將論之俄與宗正少卿何俌兩易其官公未出省吏白新舍人至公叱曰命汝取成法何遲也吏懼探懷出之公亟具奏乃緘印上馬去上尋悟中傷之由請外弗聽猶以侍講夜對上曰敵急欲和其勢甚䠞公乞力任張浚恢復可必因再求去上曰卿直諒四海所知且留經筵事無大小皆以告朕二年二月兼權國子祭酒六月除權兵部侍郎八月上以災異避殿減膳詔廷臣言闕政急務公以賑恤為先務議和為缺失於是太學生七十七人同上書乞再相陳康伯用胡某為腹心進兼侍讀金人議國書未合或謂末節不必較公曰富弼以死爭獻納二字今欲君父卑辭下仇敵愧弼多矣上韙其言十一月以邊事改卜郊公言不可者十又大臣主和益堅公爭之力以本職措置浙西淮東海道命下即趣行時金人深入號八十萬淮東郡縣望風退避髙郵守陳敏拒之射陽湖而大將李寶駐師江隂不肯援敏公檄寶出師嘗取密詔為自安計公劾奏曰臣受詔令范榮備淮李寶備江緩急更相援今寶視敏弗救若射陽失守大事去矣寶懼與敏犄角退敵兵時大雪河凍公親劚冰濟舟師人以用命初公與尹穡同出使浙東置家于京公使江淮蓋受敵之地攜孥北行實安衆心言者乃併指為罪閏十一月與穡俱罷久之提舉江州太平興國宫乾道五年冬上語諫臣單時思得節誼之士時奏公中興初率鄉兵遏敵事上雅知公陳虞二丞相復薦之遂除集英殿修撰起知漳州未赴六年春改泉州趣令奏事上曰每思卿直諒今朕恢復之志已決公曰陛下嘗欲移蹕金陵何為中輟上曰以民之不易少需耳留為在京宫觀兼侍講閏五月除權工部侍郎論前修史功進官一等十一月真拜侍郎公言初元經筵七人老臣獨在願乞身歸田里上曰卿忠孝神物護持且留觀朕恢復同載大梁或忌公敢言摘細故雜事朝士併撼公兾不得獨留公自以年踰七十遂求致仕詔除寶文閣待制在外宫觀七年三月也未數日特留提舉祐神觀侍講如故上曰卿大節可嘉朕不忍令卿去未幾受詔舉堪任刑獄錢穀及智略吏能各二人言者又謂公所舉非其人貶秩二等公知不容力求退進敷文閣直學士再提舉興國宫特許陛辭公奏願陛下任賢斥邪理財訓兵逮鰥恤孤必報國仇必歸陵寢必復故疆上曰朕志也又問卿今何歸公曰臣向在嶺海嘗訓傳諸經今歸廬陵將成此書特賜通天犀帶以寵之公既歸上趣所進書遂上易春秋二禮解詔藏祕書省尋復原官淳熙二年上思公不置諭大臣令進職初擬稍遷上特升十等遂為龍圖閣學士前此未有也太上慶七十獨公以前朝龍飛甲科遷朝奉郎祠滿又納祿上令因任近臣有言秦檜時臣僚被貶斥者後皆還其所歷嵗月惟胡某為議郎將四十年未嘗自列詔特豫四官遂轉朝散大夫三年冬三納祿優詔不允四年秋秩滿特命提舉隆興府玉隆萬夀宫五年夏上以公連嵗納祿舉大梁同載之言諭大臣使留公仍進端明殿學士六年冬三省復奏公祠滿上曰銓雖老不衰昨去國欲他日從朕中原朕嘗壯其言可召歸處以經筵公引疾力辭因陳時病五事且曰劉珙張栻將死其言甚忠李椿鄭鑑之去國論議皆有補陛下盍念之顧何以老臣為上知公不能來七年春超轉朝議大夫再食興國宫祿公稱疾篤四月加資政殿學士致仕五月庚辰薨遺表猶欲為厲鬼殺賊贈通議大夫官其後三人享年七十有九初封廬陵縣開國男加至本郡開國侯食邑自三百戶積至一千五百戶實封百戶是年冬十月丙午葬于縣之儒行鄉松山原祖塋之右以子升朝遇郊恩贈通奉大夫娶劉氏中散大夫湖南提㸃刑獄公事敏材女先公卒贈淑人五男泳承務郎監江淮總領所惠民局兼行宫雜賣場淳熙初卒官澥今為奉議郎前沿海制置司幹辦公事賜緋魚袋能世其家浹承務郎瀳承奉郎沖未命夭五女適從事郎道州司法參軍嚴萬全福唐葉昌嗣上饒方自厚通直郎簽書昭信軍節度判官㕔公事賜緋魚袋王宗孟將仕郎王蕆孫男十五人槻承事郎奏辟廣南西路轉運司主管文字築文林郎監泉州市舶務杙承奉郎桯㭄榗梴枅機棿檟枃樺檖柝椅女七人惟公忘身為國首倡正議人已知敬畏又平居持論鯁挺視權貴有不善趨向有不正輒奮髯欲扼其吭略無顧避士大夫以是疑公特立獨行不可得而親其實篤厚恭寬孜孜樂善常欲以學道愛人之實施諸有政既不大用於朝嘗三拜二千石復未及布宣於外故公之剛雖表表愈顯而其仁心則罕知者昔蘇文忠公作剛說謂夫子以剛毅巧言辨仁不仁深闢太剛則折之說由公視之其信而有證哉公性孝友在海南聞母喪慟絶水漿不入口一昔鬚髮盡白當任子先祿兄之子嵗時㑹聚宗族恩意周備收恤貧弱不計家之有無與朋友交情文兩盡田父野老蕘兒牧夫亦接以禮得其歡心奉身儉約非賔祭食不重味間被君賜可辭則辭不可辭則以賙人先疇外寸地無所增識者嘆服公聰明既絶人又能堅忍勤苦聖經賢傳晝夜繹思古文竒字悉力研究發為文章雄深雅健清新藻麗下筆輒數百言尤刻意詩騷用事深逺措詞竒崛後生投贄率次韻以酬多至百韻數十篇愈出愈工字畫端徑兼通篆𨽻碑版一出人爭傳玩邃於禮學能躬行之冠婚喪祭必遵古訓釋老異端一切屏棄親舊慶弔寒暑不輟自壯至老始終如一在新興名室曰淡晚號淡菴老人遂以名其集總一百卷又著易拾遺十卷書解四卷春秋集善三十卷周官解十二卷禮記解三十卷經筵二禮講義一卷奏議三卷學禮編三卷詩話二卷活國本草三卷自公之沒其子以門人今祕書監楊公萬里所狀行實來求銘某自少知慕公名德隆興初先後入兩省中間郊居從游幾十年已復遞宿玉堂凡公文行皆親薰而炙之銘其敢辭獨念官品雖未應諡而名節如此顧在隱德丘園之下耶幸從執政之後當任斯責暨尸宰事始奉明詔諡公忠簡而郡庠又以公配祠六一先生然後哀榮兩備銘公有辭矣銘曰河入中國地卑而傾屹立抵柱其勢乃分江㑹三峽湍束於隘截然灔澦其流乃殺天方驕金帝維念親事之至難有君無臣齗齗滿朝其瀾孰障言言胡公正論獨抗鼎鑊刀鋸視之猶無嶺海﨑嶇不曰夷途相欲殺公彼憸趨和天子仁聖公卒無禍晚儀正朝素志弗移不㑹于梁則繫乎時富貴夀考百年之頃孤忠大節千古惟永懦夫以立清哉伯夷孔孟亟稱公乎得師宋故資政殿學士朝議大夫致仕廬陵郡開國侯食邑一千五百戶食實封一百戶賜紫金魚袋贈通議大夫胡公行狀曽祖璉不仕曽祖母夫人康氏劉氏祖愷贈承務郎祖母張氏封孺人父載纍贈太中大夫母陳氏張氏所生母曽氏俱贈淑人公姓胡諱銓字邦衡其先金陵人五季避地廬陵祖愷未仕而沒贈承務郎父載纍贈太中大夫母陳張所生母曽俱贈淑人皆以公惟祖母張以百嵗封孺人云太中氣慷慨以試有司無遇即棄去公自幼超詣絶世强於記覽有質以古書者必曰是出某書某卷驗之而信年二十八太學試文淨不加㸃博士驚異建炎二年上皇策士於維揚初擢公第一有媢其直者竟置第五授文林郎撫州軍事判官未上昭慈聖獻皇太后避敵於䖍州兵踵至公裒氓為兵與撫州太守張循軍合遏其衝敵退論功轉承直郎權吉州軍事判官時羣盜四起守臣張中彥檄公督别將趙之儀捕之覘者請夜襲之公不可曰賊掠民自從將毋俱焚遲明賊遁掠者得釋未幾丁太中憂除喪與兄蓬山居士鑄築精舍於里之洞巖從名儒蕭楚諉畫古學冥搜治亂安危根株或勉之仕不答紹興五年忠獻魏國張公浚都督諸路兵辟公提舉荆湖北路常平茶鹽司幹辦公事故荆湖南路提㸃刑獄司幹辦公事多赴都堂審察兵部尚書呂祉以賢良方正直言極諫科薦賜對便殿公論持勝及納諌及䖍冦及營田事上曰營田孰初對曰田制邈矣三代曰井春秋之晉曰爰秦之商君曰轅漢之朝錯曰屯趙過曰代充國曰營真宗用耿望之計於是乎治屯田仁宗用歐陽修之議於是乎建營田無弊法有弊吏今募民營田官給之牛具貸之種矣然湖之南土牛之所生市之以出鄉則無全牛降之嘉種官有其費强之於吏手則無實惠上曰善當改之改通直郎樞密院編修官七年十一月宰相秦檜決䇿暨金人平王倫誘致北使以僞詔來責禮異甚中外洶洶公獨奏封事其略曰臣謹按王倫本一狎邪小人市井無賴宰相無識舉以使敵誘致敵使以詔諭江南為名是欲臣妾我也是欲劉豫我也豫臣北狄南面稱王自以為子孫帝王萬世之業一旦敵人改慮捽而縛之父子為虜商監不逺倫又欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為仇敵之天下以祖宗之位為仇敵藩臣之位陛下一屈膝則廟社盡汙草莽赤子盡為左袵官執盡為陪臣異時敵人無厭之求安知不劉豫我乎夫三尺童子至無知也指所仇而使之拜則拂然怒今堂堂天朝相率而拜所仇曽童孺之所羞而陛下忍為之耶倫之議乃曰我一屈膝梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此啖陛下然而卒無一驗則敵之情僞已可知矣而陛下尚不覺悟竭民膏血而不恤忘國大讎而不報含垢忍恥舉天下而臣之甘心焉就令彼決可和盡如倫議天下後世謂陛下何如主况敵人變詐百出而倫又以姦邪濟之梓宫決不可還太后決不可復淵聖決不可歸中原決不可得此膝一屈不可復伸國勢陵夷不可復振可為痛哭流涕長太息者矣向者陛下間關海道危如纍卵當時尚不肯北面臣敵况今國勢稍張諸將盡鋭士卒思奮只如頃者敵人陸梁僞豫入冦固嘗敗之襄陽敗之淮上敗之渦口敗之淮陽較之蹈海之危固已萬萬倘不得已而用兵我豈遽出敵人下哉今無故而臣之欲屈萬乘之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連所以義不帝秦非惜夫帝秦之虛名惜夫天下之大勢有所不可也今內而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦為之孔子曰微管仲吾其被髮左袵矣夫管仲霸者之佐耳尚能變左袵之區為衣冠之㑹檜大國之相也反驅衣冠之俗為左袵之鄉則檜也不惟陛下之罪人實管仲之罪人矣孫近附㑹檜議遂得參知政事檜曰敵可講和近亦曰可和檜曰天子當拜近亦曰當拜嗚呼參贊大政充位如此有如仇騎長驅能折衝禦侮耶臣謂檜近亦可斬也區區之心願斬三人頭竿之藁街然後羇留敵使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死耳寧能處小朝廷求活耶書奏除名編管昭州時侍御史鄭剛中諫議大夫李誼吏部尚書晏敦復給事中勾龍如淵戶部侍郎李彌遜向子諲禮部侍郎張九成俱入對引救檜迫公議亦僞為救公者謫監廣州都鹽倉改簽書威武軍判官事於是寺丞陳剛中以箋賀公曰屈膝請和知廟堂禦侮之無䇿張膽論事喜樞庭經逺之有人又曰知無不言願請上方之劍不遇故去聊乘下澤之車陳坐是謫知䖍州安逺縣死焉三十年御史中丞羅汝楫彈公以奉議郎除名謫新州同郡王庭圭以詩贈行有癡兒不了公家事男子要為天下竒之句為歐陽識所告王坐貶辰州新州太守張棣告公訕上再謫吉陽軍時有觀察某上書乞代公行不報張棣擇一牙校遊崇者送公至半塗臨大江崇拔劍而前公色不動徐曰逮書謂送某至吉陽者賞爾不愛賞乎崇笑而止至朱崖或諗公以有後命家人為慟公方著書怡然也吉陽士多執經受業者凡經坯冶皆為良士初吉陽貢士未嘗試禮部公勉之行及位於朝乃請廣西五至禮部者乞不限年與推恩自是仕者相踵聞母曽之喪一慟幾絶勺飲溢米三日不啜鬚髮盡白見者出涕先是檜大書丞相趙公鼎參政李公光及公姓名於格天閣干進者爭以公為梯監察御史田如鼇獻書乞斬公檜抵之地光坐移書於公再貶儋耳武運通判方疇以致書議姻遂下若盧二十六年檜卒公量移衡州三十一年正月公與忠獻公偕命自便時忠獻謫零陵公自衡造焉館於讀易堂忠獻從容謂公曰秦太師顓柄二十年成就邦衡一人耳今上即位首復公官除知饒州召至行在所即日賜對上溫顔曰久聞卿直諒公首論為國以禮又論今日之事在修德以結民心固吾圉練兵選將以觀釁待其衰上嘉納除吏部郎遷祕書少監又遷起居郎論史官失職有謂記注不必進呈使史官無諱史官當立於御座之前庶幾言動皆得以書今之史官後殿立而前殿不立請前後殿皆立左右史奏事請令直前不必預白閣門及以有無班次為拘許之自是史職盡復昔制知祖宗之舊公請遷都建康謂漢髙入關中光武守信都大抵與人鬭不扼其吭拊其背未能全勝今日大勢自淮以北則天下之吭背也建康則扼之拊之之地也若進據建康下臨中原此髙光興王之計也况今西北欲歸之人如漢氏之君漢苟不移蹕何以繫其心詔議行幸言者請紓其期遂止隆興元年六月忠獻張公自建康入奏圖恢復計侍御史王十朋力贊之於是忠獻公督師進討金人既克宿州以大將李顯忠欲其金帛且與邵宏淵私憤復敗於敵上憂甚十朋亦自劾上愈怒公言近者淮上之衄蓋天以是厲陛下之志使動心忍性增所不能願益强其志母以小衄自沮搜乘補卒期於身濟大業時宿州之師賞罰不決公言宿州之敗誤國之將厚賂權貴游說自解安處善地誅戮不加禍亂之漸間不容髮願毋忽兼侍講及國史院編修官因講禮記進序篇其略曰君以禮為重禮以分為重分以名為重名以器為重願陛下辨其分謹其名守其器勿輕假人七月上以旱蝗星變詔問闕政公請勿徼福於佛老之教而躬行周宣憂旱之誠戒監司守令有貪殘者必罰是應天以實公因論納諫曰今朝廷之士以箝默為賢容悅為忠道路相傳近日臺諫論事朝廷謂為賣直臣未知信否夫賣直之言唐德宗之言也德宗猜忌謂姜公輔為賣直出此一言忠臣結舌馴致興元之變所謂一言喪邦者也願陛下以德宗為戒以太祖皇帝欲拜昌言為法上曰非卿不聞此九月金人求更成大臣欲從之公奏曰金知陛下鋭意興復移書請和非甘言誘我即詭計緩我爾願鑒前車之覆益修守備益張吾軍上曰朕有二說斷然不移一則中原歸附之人決不可遣二則夷夏名分決不可亂又曰邊事倚張魏公乃對曰陛下至誠如此何憂北敵願持之以不懈絶口不言和字上曰卿忠直如此朕甚喜兼權中書舍人公遜於右史馬騏上曰無以易卿又言恐駁事不勝任上曰貴當理遂就職進兼同修國史有㫖以中人李綽等常典發軍書無誤各進名一列公不奉詔綽等泣訴上曰胡銓不肯經筵講禮記至愛而知其惡憎而知其善公曰愛而知其惡必棄之勿疑憎而知其善必任之不二上稱善聖夀明慈皇后改稱教㫖為聖㫖公言易曰大哉乾元至哉坤元蓋天地之位不可並故以大哉至哉為别陛下雖奉親盡孝而光堯與夀聖難於並稱聖㫖上嘉納謂樞密洪遵曰奉親之過朕當自受張栻召對賜三品服公言君子愛人以德今賜栻服章非愛之以德也其父浚決不肯使人輕受栻亦有守決不肯妄受恐或議浚非全浚也十一月上以和戎之利病遣使之可否禮文之後先土疆之取豫下廷臣雜議公議曰國家與金人講解覆轍亦可睹矣京都失守自耿南仲主和二聖播遷自何桌日人人主和維揚失守自汪伯彥黃潜善主和完顔亮之變自秦檜主和國家罹戎狄之禍何嘗不以和哉議者乃曰陽與之和而隂為之備外雖和而內不忘戰此又向來權臣欺君誤國之言也一溺於和則上下偷生將士解體終身不能自振尚安能戰乎大臣見之相顧失色於是益忌公且欲奪魏公兵柄公復沮其議除宗正少卿公請補外不允嘗遞宿玉堂上問曰金人汲汲欲和聞其勢窘甚對曰近有自淮甸來者云金人聞陛下力任張浚所以汲汲欲和臣願陛下委任勿疑則恢復可必上曰善公又申前請上曰卿久在瘴鄉而略無瘴色天祐直諒卿未宜去兼國子祭酒因見公言往年睿㫖欲移蹕建康不可但已上曰澶淵之役當時有勸幸蜀及江南惟冦萊公決䇿公曰今張魏公陛下之萊公也願早定計上曰善卿直諒四海莫不聞不可言去且留經筵事無大小皆以告朕公言晉開運之末有陳友者殺李璘之父國初璘遇友於途手殺之而自言鞫之得實太祖壯而釋之臣願陛下堅復讎之志以不忘太祖之訓上在講筵謂公曰卿之學術士所甚服因及此日文士如蘇軾黃庭堅者誰與對曰未見其人詩人如張耒陳師道者誰與對曰太上時如陳與義呂本忠皆宗師道者上曰如韓駒徐俯皆有詩名卿可廣訪其人退而乃薦王廷圭朱熹楊萬里周必正弟鎬猶子昌齡籍云除兵部侍郎公言受降古所難六朝七得河南之地不旋踵而皆失在梁武時侯景以河南來奔未幾而陷臺城在宣政間郭藥師自燕雲來降未幾而為中國患今敵中三大將內附高其爵祿優其部曲以繫中原之心善矣然處之近地萬一包藏禍心或為內應後將噬臍願勿任以兵柄遷其衆於湖廣耕種以絶後患時有國學士獻書闕下乞用福國陳公康伯及公為腹心者七十有七人二年八月上以災異數見避殿減膳詔廷臣各陳闕政及急務公言禹有九年之水而國無捐瘠備先具也今數路水潦曽不踰時而民已流殍無備甚矣願詔遭水之處博施賑恤使民被實惠無至流徙此先務也陛下又令條陳闕失臣謂今之闕失孰有大於和議者因極陳和議可痛哭者十上太息公言自靖康至今凡四十年敵未嘗不由詭道而我終不悟也竊聞道路之言敵緩我以和而實潜師以伺我或言多作戈船由海道以進或言實粟塞下由間以來願陛下堅守和不可成之詔力修政事十年生聚十年教訓如越之圖吳則社禝幸甚進兼侍讀因進讀寶訓至食訖習射奏曰四夷易以兵制難以信結願陛下謹守此言上曰文武豈可偏廢又讀真宗顧李宗諤曰聞卿至孝能保宗族朕守二聖基業亦猶卿之守門戶公奏曰唐栁玭云積纍如登天覆墜如燎毛祖宗基業誠不易守上稱善公言側聞金人謾書欲議書禮有所增損議者謂末節不必較臣竊以為議者可斬也四郊多壘卿大夫之辱楚子問鼎義士恥之故獻納二字富弼以死爭之今敵人橫行與多壘孰辱國號大小與問鼎輕重孰多獻納二字與再拜孰重臣子爭與君父屈己從之是多壘不足辱問鼎不足恥獻納不足爭也臣願絶和議以鼓戰士左氏謂無勇婦人臣謂今日舉朝之士皆婦人也十一月以邊鄙有釁詔改北郊用來年正陽之月大雩之辰公稽參禮經及國朝故事陳不可者十宰相湯思退參政王之望等堅主和議遂罷張魏公兵柄公又力爭之於是大臣皆不悅遂除措置浙西道淮東海道使詔趨行以二日為期公即辭行曰臣願陛下先絶和議上曰要盡其在我者時金兵及境號八十萬聲動輦轂下自維揚海陵連數郡望風棄城髙郵太守陳敏與敵相距於射陽湖水軍帥李寶屯江隂詔寶條陳舟師及扼守要害白海海公使公檄寶發兵援敏寶不行公奏曰臣受詔令范榮備淮李寶備江緩急則更相援今寶逗遛違詔坐視敏之孤臣恐射陽失守則大勢去矣上以命寶公又移書切責之寶乃發兵渡淮與敏相犄角敵一夕退時天大雪河冰皆合舟車不能進公先使軍槌冰士皆奮尋詔罷兵而時相亦斥死除提舉江州太平興國宫加集英殿修撰知漳州改泉州入見言郡邑害民之大者三上曰每思卿直諒朕恢復之志已決今金人土木不息旱乾相仍機不可失對曰陛下嘗許臣以誓不與敵和何為中變又謂臣決移蹕建康何為中輟上曰以民之不易少須又曰在廷大半腐儒卿不可去一日祕書郎張淵對選德上因數不詭隨者云猶有胡銓一人在除在京宫觀兼侍講公論前古未有不由講學而興滅學而亡精兵百萬不如道德之威被練三千不敵忠信之胄陛下之意端在於是上稱善除權工部侍郎以修史書成轉承議郎因見上曰屬已得契丹要領卿觀朕施設公言少康以一旅復禹蹟今陛下富有四海非特一旅而即位九年復禹之效尚未赫然又言四方多水旱乃者乙酉之嵗修門之外斗米易一婦女小兒半之左右不以告此謀國者之過也宜令有司速為先備尋命為工部辭焉詔曰汲黯在漢謀寢淮南隨㑹仕晉盜奔秦境卿其奚辭賜對衣金帶封廬陵縣開國男食邑三百戶令參政周公必大視草以御札歸公令藏於家公嘗燕見言初元經筵之臣七人惟臣獨在臣老矣願乞身歸田里上曰卿忠孝有物護持且留觀朕恢復立皇太子公請飭太子賔僚朝夕勸講上曰三代長且久者由輔導太子得人所致末世國祚不永或七八年或五六年或三四年皆由輔導不得其人所致對曰誠如聖訓公力乞致仕除寶文閣待制與外祠既出都門有㫖復留改右神觀兼侍讀公辭不得請於經筵講罷復申前請上曰卿大節可嘉朕不忍令卿去因論納諫公曰從諫人主之髙致陛下自登大位虛懷受言中外翕然咸謂恢復之期指日可冀然靡不有初鮮克有終光武之殺劉洎終之實難詔舉堪刑獄錢榖及有智略吏能各二人公以張敦實昌永周必達李發劉之柄應書言者謂舉李發劉之柄非是公坐貶秩二等三求去上不得已從之除敷文閣直學士與外祠辭行言於上曰願陛下規恢逺圖任賢除邪理財訓兵矜寡恤孤然後布告中外必報國讎必歸陵寢必復故疆以副太上付託上曰朕志也又問卿今何歸對曰廬陵又賜通天犀帶又曰臣在嶺海無所用心妄意經學三十年粗能訓傳上曰卿可進來既歸詔趨之遂表進易春秋周禮禮記解命藏之祕書省復奉議郎除龍圖閣學士提舉江州太平興國宫制有身蹈東海獨仲連不欲帝秦名重泰山微相如何以强趙之語光堯天聖七十慶夀湛恩轉朝奉郎進封開國伯益邑三百戶公復乞致仕優詔不許除端明殿學士明堂合祭禮成復增邑戶三百實封百戶淳熙六年十一月召赴行在所公辭焉復力乞致仕不許公遂引疾轉朝議大夫提舉江州太平興國宫遂稱篤且極陳時病五事上察公志不可奪乃加資政殿學士致仕明年夏五月疾革庚辰薨不及家事惟命諸子口授遺表有死為厲鬼以殺賊之語奏聞特贈通議大夫年七十有九諸孤卜於是嵗十月丙午葬於廬陵縣之儒行鄉松山原祖承務府君塋之右公明德峻極外國敬畏丞相洪公適述其先忠宣公敵中事云皇太后以書歸曰胡銓封事此有之知中國有人益生懼心公於利不茍取初欽祖既祥及册隆興皇后公以職將事皆賜金帛再辭必得請乃已使海道日賜金十鎰既歸或惎之以理生業者悉以賙婚㕛之貧其於君賜尚爾故沒齒九疇不益一畝邃於禮學冠昏喪祭式禮迂叟佛老梵唄焚紙為錢一切剗磢四仲享先設醴分膰坐客百人州閭耆老不問貧賤挹必躬投壺賦詩雜以琴奕往往申旦睦族篤親慶弔必詣寒暑風雨不為回車居新興時嘗名其室曰淡蓋取賈生淡若深淵之意晚自號淡菴老人云公居無事時下心拱手言恐傷人獨論國事徑氣正色貫日襲月奮以直前不怵不惻不疚不式大節揭揭細行斬斬動容出辭見者起敬長身玉立望之山如即之春如其為文章駿奔軋忽幽紛膠轕隱帙竒字旁摳逺擷初讀之者口呿語難徐綜其緯理順脉屬似肆實莊若險實夷韓碑栁騷嫓美髙儷中興以來作者寡二筆畫真𨽻上規顔蔡鐵屈石出省其作人飯不重肉一製十稔而豆區飢民棺斂道殣退省其橐屢空不贏惟太中公不貨於私繄德之植公實儀之蓬山既逝公字其子嵗在癸巳潚以公任孝友惟祗忠義惟幹葰茂碩人豈一朝夕公有淡菴文集一百卷周易拾遺十卷書解四卷春秋集善三十卷周官解十二卷禮記解三十卷經筵二禮議義一卷奏議三卷學禮編三卷詩話二卷活國本草三卷娶劉氏贈淑人先公卒中散大夫荆湖南路提㸃刑獄敏才之女子男五人泳承務郎監江東淮西總領軍馬錢糧所太平惠民局兼行宫雜賣場淳熙二年卒於官參政周公哀而銘之澥承事郎監潭州南嶽廟浹瀳皆承務郎沖未命女五人適南昌嚴萬全福唐葉昌嗣上饒方自厚承務郎贑州興國縣丞王宗孟將仕郎王蕆孫男六人規􅀈桯杙杋榗女四人長曰相孫夭餘皆幼萬里與公同郡常從學公將竁萬里以繫嶺表不得築室於場澥走書二千里以公猶子承務郎致仕昌齡所述公之言行諉萬里論次將乞銘於參政周公萬里敬慟哭而書之謹狀淳熙七年九月日門人朝奉郎提舉廣南東路常平茶鹽公事楊萬里狀跋林黃中書忠簡胡公遺事林侍郎黃中一字寬大其所書淡菴先生遺事當萬里作行狀時所未聞者豈特某所未聞其子孫亦所未聞也是時王之望尹穡得志其威能陷張魏公而不能不折於先生之一詰其辨能奬敵勢以脅其上而不能不沮於公之一答兹不謂大丈夫乎跋忠簡胡公先生諫草淡菴先生之孫槻寄示先生諫草凡十一行卒章云臣不忍見敵人入門等語其痛次骨萬里讀至此不覺涕泗之沱若也蓋當是時和戰雜之時也國是數定而屢搖國勢將怯而復壯仲尼曰民到於今受其賜跋張魏公答忠簡胡公書十二紙此帖十二紙皆紫巖先生魏國忠獻公答淡菴先生忠簡胡公手書也紹興季年紫巖謫居於永淡菴謫居於衡二先生皆六十矣此書還往無一語不相勉以天人之學無一念不相憂以國家之患也萬里時丞零陵一日併得二師今犬馬之齒七十有六夙夜懼此身將為小人之歸復見此帖再拜三讀二先生忽焉洋洋乎如在其上如在其左右誠齊詩話吾州詩人瀘溪先生安福王民瞻名庭圭弱冠貢入京師太學已有詩名有絶句云江水磨銅鏡面寒釣魚人在蓼花灣回頭貪看新月上不覺竹竿流下灘紹興間姦相秦檜力主和戎之議鄉先生胡邦衡名銓時為編修官上書乞斬檜謫新州民瞻送行詩一封朝上九重關是日清都虎豹間百辟動容觀奏議幾人回首愧朝班名髙北斗星辰上身落南州瘴海間不待百年公議定漢庭行召賈生還大厦元非一木支要將獨力拄傾危癡兒不了公家事男子要為天下竒當日奸諛皆膽落平生忠義祗心知端能飽喫新州飯在處江山足護持有歐陽安永上飛語告之除名竄辰州孝宗登極召為國子監簿以老請辭除直敷文閣宫觀淡菴文集附録
